[[fics.chapters]]
text = """<p>"-anyways, I was thinking that, and I wasn't sure-"</p><p>"Miranda?"</p><p>Miranda blinked. "Yes, Allen?"</p><p>"Er, I don't mean to be rude or anything, but does this have a point?"</p><p>"Yes! Well, a-actually, I'm suppose to ask you something without actually asking, and without you knowing you're being asked. B-but I don't really know what the question is. How is that suppose to work? W-wait, what if I mess up? What if- No! I will mess up! She'll hate me!" The slightly bipolar exorcist began to cry hysterically, and of course, quite disruptively. Allen figured he had to put an end to it, before someone came to investigate. "This-"</p><p>"...Miranda?"</p><p>"How will I go on in the world when poor, sweet, wonderful little Lenalee hates me?!"</p><p>"Miranda!"</p><p>The older exorcist sobbed. "I don't d-deserve to live in this world! There is no place for meee!" And suddenly, Miranda had a giant steak knife that had appeared from Who knows where- Even Allen hadn't seen.</p><p>And somewhat inappropriate for the situation, Allen had the sudden inspirational thought that Miranda might be good at cards...</p><p>Miranda, shaking and crying and hiccuping violently, held the over-sized knife to her heart as she said her 'final goodbye's'. "Good bye! Good bye, cruel world! I know you've always hated me, but even this was t-too much for me! G-Good bye to all the kind people who tried to help me, before discovering that I'm good for nothing and I always mess things up! Good bye, good bye, good bye!"</p><p>"M-miranda!" Finally, Allen regained enough sense to snatch the knife away from the crying woman, which, in itself, wasn't difficult; The hands previously holding the sharp weapon were shaking so badly, Allen was surprised the knife didn't fall by itself.</p><p>Taking in deep breaths of air, Allen held the knife as far away from the now suicidal woman in front of him. "...I take it Lenalee ask you to do this?"</p><p>"M-my knife! Give it back, Allen! I don't d-deserve to live! The w-world would be b-better off w-without me!"</p><p>"No, Miranda, it wouldn't. We all very much enjoy having you with us. We would be very sad if you left."</p><p>A sniffle. "Really?"</p><p>Allen attempted a smile. He failed, but maybe she wouldn't notice, so he kept trying. "Really, Miranda." While silently thinking, 'what did I do to deserve this? She's not going to make an insane leap for the steak knife, is she?' "Now, about Lenalee? She asked you to ask me, didn't she?</p><p>Miranda blinked her tears away in surprise. "Y-yes, she did! And she's going to hate me! You weren't suppose to find out it was her!" A sob. "I... I'm such a failure... I don't deserve-"</p><p>"Miranda, please. No one will hate you."</p><p>Another sniffle. "Are you s-sure?"</p><p>"I'm sure. Now, about Lenalee?"</p><p>"Oh, H-how do you k-know Allen? I'm s-such a horrible person. How can she ever forgive my stupidity?" Well, at least she wasn't making a stupid attempt for the knife, and at least she wasn't screaming anymore.</p><p>But there was no way he was going to get any more information from this one. Allen sighed, and put on his best fake smile. "Miranda, Lenalee will be so glad!" Did he sound happy yet? He'd calmed down slightly, so maybe he did.</p><p>"Eh? W-why?" She was looking hopeful. And Allen shivered internally. How could anyone be that drastic and bipolar?</p><p>The smile twitched. "Just go back and tell  her that it's not you. It'll make her day, really. Would you just go tell her that?" He'd tell her to quit making his life miserable on his own time.</p><p>Miranda smiled joyfully and wiped away her tears. "Of course Allen. As l-long as you're s-sure."</p><p>"Trust me Miranda." Allen almost felt bad for lying to her. Almost. But Lenalee would act happy, and Miranda would never know the difference. "I'm sure."</p>"""
