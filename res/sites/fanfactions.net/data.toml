[[fics]]
title = "Lena-love"
authorid = 104
date = "2001/06/12"
fandom = "D.Gray-man"
tags = ["Angst"]
summary = "Some days, just on the brink of consciousness, Lenalee finds herself thinking about her mother.<br><br>A story about loss."
