[[fics.chapters]]
text = """<p>Fidgeting is something people do when they’re either nervous, or ADD. For those who have short attention spans, and can’t sit still, it is a form of trying to make sure you don’t go insane. For those mostly normal, it can be for many reasons. You could be angry, and fidget because you want to strangle something. You could be exited, and can’t seem to contain it. Or, the most common, you could be nervous. Nervous people fidget often. Even those who are not nervous by nature, tend to fidget.</p><p>Demyx was not nervous by nature. Demyx was not exited. He was not angry, he could sit still just fine, and he was most defiantly not ADD. It was a proven fact. So, as some people would, some people do find it safe to conclude that Demyx was not fidgeting. Those people were right. Demyx was not fidgeting. Demyx was trembling. Twitching, and flinching whenever someone came too near, or when it was appropriate. No, Demyx was not nervous. Demyx wasn’t even scared. Demyx was terrified. Too scared to be stiff, horrified, petrified, panicky, anxiously awaiting his doom, ect. He couldn’t think of the rest. He’d actually had more this afternoon. He was just too paranoid as of now to sort out the colliding, terrified thoughts of synonyms.</p><p>Why? Because he was the wrong guy for this. He’d always been the wrong guy. He’d always be the wrong guy. Demyx didn’t really like to fight. He’d been told he wasn’t too good at it either. Mainly though, he didn’t like conflict. He didn’t like to stir up trouble. He didn’t like trouble in general. Much as the Superior would like to think so, Demyx was not Axel. Demyx was perfectly happy with sitting on guard duty, quietly playing his sitar. Silence. Peace. An actual sky, no matter how dark and depressing that sky might be. Most defiantly not in the underworld, sneaking past, stealing something that was bound to create chaos, and conflict, and violent brawls, watching creepy dead people float past.</p><p>Now, even though they creeped him out, Demyx could stand the dead people. It wasn’t like he knew them, and it wasn’t like they knew him, so they left each other alone. But that thing he was suppose to steal. Had Number I even seen the muscles on that half god guy? It wasn’t a question, or a hypothetical statement. That guy(as Demyx so lightly and with much leeway used the word) would break Demyx in half if he got caught, his spleen seeping from the separated carcass. Demyx didn’t even know what a spleen did. But he knew it would be the first to go. Oh, and then he’d come back as one of those dead people,(if he was lucky) and get to watch his body decay, and his spleen drip into the sewer system. Did this place even have a sewer system?</p><p>So, just don’t get caught. Easy.</p><p>Ha. Easy. They could say that. They weren’t tall, and somewhat gangly, forever trapped in the awkward teenage stage. They didn’t have a sitar of all things, for a weapon.</p><p>They weren’t going to die within three seconds of being caught. They didn’t have to go on this stupid suicidal mission.</p><p>Demyx was going to die. And while they sipped their wine coolers and margaritas, they’d say ‘hey, remember that Mohawk dude?’ ‘It wasn’t a Mohawk, so much as a... what would you call it?’ ‘Dunno. Good question. But dude, that was awesome! That buff guy with the dilated pupils ripped him apart in like, three seconds dude! Aw man, am I glad I get some say in the missions we send people on!’ Something like that. They wouldn’t miss him. They’d rejoice. One less weakling in the Organization. Woohoo. The jerks.</p><p>At least it hadn’t turned out as badly as he thought it would. He’d gotten the stupid gold pendent. Sure he’d been spotted by ‘The Bone Cruncher’, as Demyx now so fondly called him. But, Demyx wasn’t dead. He’d managed to escape to the underworld, and the tan giant couldn’t follow him here. He’d be rejoicing and laughing, and maybe sharing a well deserved drink with those jerks if he could get out. Sure, he could use a portal to darkness. If he wasn’t so tired, and if using portals in the underworld didn’t almost kill you. He didn’t know what it was. Something to do with the power of Hades or…something? He hadn’t been paying attention at his briefing.</p><p>So now he was stuck with the stupid dead people. All he could do was try and thing of a way out, and to not get caught by the big blue, flaming guy. Now that he thought about it, Hades and Axel would probably get along. Freaks. What was so great about fire?</p><p>/Demyx./</p><p>Demyx swirled around, his arms swinging with his body to keep his balance. What was that? It could have been his imagination, couldn’t it? It had to be. He took a deep breath, trying to relax the muscles in his arms.</p><p>/Deeeemy…/</p><p>His breath caught, and he immediately tensed up again. His imagination.</p><p>/The kid’s weak enough he can’t even see us?/</p><p>/Ohhh, but he’ll see me…/</p><p>The grin materialized first. The gleaming, deadly teeth. The first thing that immediately came to mind was the creepy, rhetorical pink cat he’d been harassed by in that card world. He’d hated that cat. It scared him, and it stalked him, and it kept appearing everywhere, especially when Demyx least wanted to see it. Not that Demyx ever wanted to see it, but some times were better then others.</p><p>But then came the stunning, inhumane pink. The kind of pink that your obscene neighbor has, the one that you constantly throw old eggs at to improve the color and the smell. Demyx’s throat almost betrayed him by screaming. Instead, it settled for a squeak. It was pathetic, but at least he hadn’t screamed.</p><p>The grin widened sadistically, and then began to open and close, as mental words cam out, and the rest of the body was formed. Demyx knew who it was. He certainly didn’t want to remember, but he did. Marluxia. Of course. It just had to be him.</p><p>/Well, Number IX. Scared?/</p><p>Demyx squeaked again. Marluxia laughed, the horrible sound echoing through the empty damp caverns.</p><p>Demyx couldn’t stop staring at the teeth of the ghost. Was it just him, or had the pink haired man’s teeth gotten sharper in death?</p><p>/Leave him alone, Marluxia. At least he didn’t get him self killed./</p><p>The transparent figure frowned.</p><p>/What, like you Number VI? Killed by that stupid pyro./</p><p>/Marluxia, the Graceful Assassin, assassinated by a little kid?/</p><p>The assassin growled at the air.</p><p>/Shut up./</p><p>/Oh, did I hit a sour spot?/ the voice was mocking.</p><p>/Zexion, you just shut-/</p><p>/Oi, he hasn’t said anything in a while. Think we killed him?/</p><p>Marluxia’s terrifying grin returned as his eyes regained focus on Demyx.</p><p>/Ohh, I think we’ve scared the little baby./</p><p>Demyx couldn’t get any sound out of his now dry throat.</p><p>The grin grew more wicked as the eyes became bloodshot, and Marluxia began crying blood. The pupils rolled to the back of Marluxia’s head, until only the whites of the eyes and the red staining liquid was left. Demyx began to shake, feeling his own blood leave his face.</p><p>The right side of the assassin's face began to decay, a fowl stench erupting from Demyx’s imagination. Half the face was completely melted, when the bloodied eye popped sickeningly from it’s socket, and fell to the ground, rolling ever closer to an aghast blonde. All he could do was stare, wide eyed at it. It swiveled in place, and stared back.</p><p>/Then run, little boy./ The voice was caustic, a whispering in his ear, much more solid and absolute then it had been before.</p><p>Demyx ran.</p>"""

