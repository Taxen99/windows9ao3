text = """<p>Allen has taken it into serious consideration, that his brain doesn't function properly. Teenage boys around his age, by now at least, should have started thinking about, dare he say it (but he does, shivering), girls. And yes, he thinks about Lenalee, but not in that way, and he thinks about Miranda, wondering if she's alright, but not because of that. Because she's clumsy, and kind, and she cried for him. Anyone deserves his thoughts after that. And Lenalee is a wonderful person, but he'd never (shiver) sleep with her, and for the life of him, he can't figure out why, except that if he had a sister, it'd be an awful lot like sleeping with her.</p><p>So, Allen thinks that his brain doesn't work right. He even borrowed Lavi's er... books, as a last resort. It had been horrible. Horrible, and awkward and embarrassing. Allen thought he'd burned out his eyes, and he knows he's not suppose to feel that way, not only because he's been talking to Lavi, but because he's lived with his master for more then seven years, and he thinks he knows what a man should be thinking about a woman. Allen knows, and yet, Allen doesn't. What should he be thinking about? Shouldn't he be thinking about her lips, her skin, her breasts, the feel of her panting underneath him? (The thoughts flow through him quickly, so he doesn't have a chance to throw up.) Shouldn't he be thinking about how soft that skin would be, about how wonderful it would be to have her, have her consent? Have her give in, and moan, beg for more, scream his name into the seemingly endless night? (Allen can hardly stop himself from snickering, because if there was ever a time to use the word 'corny', well...)</p><p>Then again, if he ever did, perchance, get her in a position like that, well, he can't imagine.</p><p>Allen has been reading romance, just in case he missed something from his Master. Shivering with horror and disgust, he finds out he hasn't.</p><p>He doesn't want this, and it's scaring him. He, until this point, had thought he was just a 'late bloomer'. He has war and lives to think about, so maybe his mind just hadn't caught up with his body, but he can't say that any more. And every so often, he'll try so hard to think about Lenalee right before he sleeps, and he sometimes has dreams about her. She is underneath him, soft, and light, and beautiful to everyone's eyes, and so much more so without her clothes. They're both panting, and she's calling his name, she loves him, she loves him so much. He tries to call out hers, to assure her that he loves her, that he won't leave, that he's normal. That's when he wakes up from his not quite wet dream, and goes to the bathroom. He tries to force himself to love her, clamping his eyes shut and clutching his sides, he tries to think about how beautiful she is convinced for a second that he is normal, that he's finally catching up, ignoring the horrible pain in his stomach; and then he throws up. He always, always throws up. And he feels horrible while doing it, not only because he's sick. But because he doesn't love her, he hates himself for it, and he can't go on like this. He's suppose to love her. God had given him this one opportunity, this perfect, unflawed opportunity. The timing is perfect, and Lenalee is perfect, but he's not. He's dirty, and flawed, and he can't go on like this. He knows he's tearing himself apart, and he knows it'll effect his missions, but he doesn't know how to deal with it. He can't ask anyone, he doesn't even know what wrong, only that he's not right. That he's not like everyone else.</p><p>It's scary for a fifteen year old to think like this, and Allen deals with it the only way he can figure out how. He ignores her, pretending she's like a sister to him, and she is, but she's suppose to be more. He ignores the problem, by pretending it doesn't exist. Allen knows he's running away, but he doesn't know what else to do. He's dealing with it ineffectively, and he knows he's just getting worse.</p><p>He never lets anything or anyone penetrate this wall he's so carefully constructed, the this little shell, holding back all this weight it was never meant to contain, things that were never made to be contained. This little wall is the last hope that he's so shakily holding together. His last hope.</p><p>And everyone is his friend, so why burden them with something like this, why take the chance of letting them worry? Allen doesn't want them to worry, because he's fine, and there's nothing wrong with him.</p><p>He has to tell himself that when he's in front of them, putting on his best forced smile, trying so hard not to make it empty and meaningless, struggling so much in hopes that he won't fall apart at the seams.</p><p>Every morning he'll wake up wanting to cry, and it feels like he's sewing himself together without knowing anything about a needle, stuffing himself in a tiny fabric container, and then doing his best to connect the openings so nothing falls out. It hurts, it's hard, and he has to cover up his messy handy work with patches and smiles and complements before anyone sees. No one can see, no one can see... And he doesn't know why he's so afraid. But he is, and he's so terrified. He thinks it'd be the worst if Lenalee found out. He couldn't stand himself if he hurt her in any way. It's not her fault he doesn't love her, it's not her fault she's too good for him. He doesn't love her like he should, like she deserves, but he still cares, she's still his friend. Lenalee is wonderful, and Allen considers himself filthy for even talking to her when he feels this way, especially when he doesn't know what he's feeling, only that it hurts and it's not right.</p><p>After he decided that he'd actually have to do something, he started looking at specific differences between him and other boys his age. Of course, Kanda was out of the question, so that pretty much left Lavi, and people he happened to meet when he went out on his missions or into town. After a time, he figured he'd finally pinpointed it. Others wanted to touch. They wanted to touch, and get reactions, they wanted to dominate, they wanted to feel in control.</p><p>Allen doesn't want that kind of control. He doesn't think it's right to take that kind of power from someone, even if they want it, even if they beg you for it. He thought about it, and he thinks he'd be just fine letting someone else have control, not just over that, but over other things, over little things. The idea of too much control over his life scares him. He doesn't know what he'd do with himself. With everything else, and all of the empty smiles, all of the questions, and the dreams, everything would just fall apart. He's barely holding it together as it is now. It's so much easier to have someone else tell you what to do, to have someone else with a hold on the reigns, no matter how loosely.</p><p>Women have it easy, he thinks. He doesn't think too deeply into it, because then he might find he is wrong, and he needs something; some greener place that he can't get too. He has to know he's worse off then them, because if he's not, then he's weak, and he won't survive another month of this. So as long as he's not thinking too deeply, and he's just finding a group that has an easier life then he does, then all women have to do is look pretty and wait. If they look pretty, some lucky guy will find them eventually, and they won't even have to do anything when it happens. They just sit there and let it happen. Why can't he do that?</p><p>Allen doesn't want to touch, he doesn't want control. He wants to be told what to do, it'd make things easier, someone to touch him. A fleeting, unimportant thought informs his that this might be how girls think. They're worried that they're not pretty enough for random guy A to like them.</p><p>Allen begins to believe that he thinks more like a girl then a boy, and that thought somewhat relives him, in an odd sense. That means he's still like other people, just not like most boys. There are other people like that, right? They just think things through more. He still has someone to relate to, even if it's not who he expected it to be.</p><p>For a time, the pain is bearable, because he might have someone to share it with, if he just imagines a girl halfway across the world he's never met with the same issues he has, the same pain. It helps a considerable amount, more then he thought anything ever could. He's getting better, he thinks most everyone can tell. Lavi's been looking worried, Kanda hasn't been yelling at him as often, and Lenalee is around almost all the time. He doesn't have to sew himself back together every morning, the dreams almost never happen anymore, and his smile isn't forced, and it almost isn't empty. A little more. Just a little more. He'll be alright. He'll really be alright-</p><p>And that's when everything comes crashing down, leaving nothing salvageable, leaving no trace of anything that even remotely resembles progress. He can't even remember what 'progress' looks like anymore. His trademark smile that he'd almost replenished is gone, an attempt not even lingering on his lips. He knows it has to come back, he knows he has to make an attempt at normalcy before anyone notices, but he can't bring himself to do it. Not yet. He'll do it later. He just can't take it anymore. He can't take the empty smiles he's giving everyone, and worried glances he's receiving in return. He can't take this. If this stupid little thing wouldn't have happened, he would have been alright. This stupid, stupid-</p><p>And he can't even ignore this one. He's been trying, and it only gets worse. He, he can't even, in the same room, the same, oh God, let alone a conversation... And his thoughts are always like this, so he's having trouble understanding anymore. The thoughts just keep coming and coming, and his poor little worn out heart just can't keep up. The only sane bit of information left in him, is that he has to get it together soon, and the unimportant part constantly telling him that his heart is throbbing. Not just a dull ache, or the annoying stinging anymore. That it can't take much more, and it'll probably shatter soon. It hurt, and it was all he could do to keep from crying.</p><p>Allen hates Thursdays. It was a Thursday when he finally figured it out. Why everything hurt, why it was getting harder to breathe even thought he'd thought he was doing better. He'd been in the cafeteria with Lenalee, it had been lunch. He had decided to let her go first in the line, because he always ate so much, when Lavi decided to stop by and talk to them. If he remembers right, the conversation went something like this.</p><p>"Hey, Allen!" Lavi had greeted Lenalee in a similar manner, but that wasn't the part that had nearly choked his heart.</p><p>Allen remembers answering, but what he really remembers is the last smile he plastered hastily onto his face.</p><p>"Allen, have you seen Yuu?"</p><p>His heart felt squeezed. He blames it on the fact that he can never tell if he's fooling the swordsman or not. Polite, and normal. He couldn't mess this up again. "Er, no. Should I have?"</p><p>A grin. Good. He'd done it right. "I think our wittle Yuu-chan is growing up!" Allen was pretty sure there was sarcasm and an evil plotting note to the tone.</p><p>So, he blinked, not quite smiling anymore. "What do you mean?" He wonders if he should have tilted his head.</p><p>The grin began to grow maniacally, and Lavi lowered his voice, like a weapon lowering onto the the top of a wall. The weapon that had come to assassinate his heart. "I think Yuu's got a girlfriend."</p><p>And suddenly, Allen realized he cares more about this news then he should. Yes, maybe he cares too much, but he can handle that. The bullet has missed it's target by mere inches.</p><p>Those aren't the words that kill his heart. A fleeting, quiet barely noticeable thought- no, what about me?; a simple thought, that's what's managed to crush his simple repairing life.</p><p>And that's when he realizes it's not a bullet, but a stupid homing missile that's made an impossibly sharp u-turn, and it won't stop until there's nothing left of him.</p><p>Allen Walker realizes two things at the same time. One, the current tool of assassination realizes he's not quite dead yet. Allen knows this, because if his heart were all dead, he wouldn't be able to feel this much pain. He wouldn't want to cry anymore. And two; the bit of self information that might just be the bit to kill him in the end.</p><p>Like a silly, passive girl, he's fallen stupidly in love. But he couldn't fall for the easy one, the nice one, oh no. Of course not. He's in love with Kanda, and he has been now for too long.</p><p>He's in love with Kanda, and he can hardly breathe when he thinks this.</p><p>But there is one bit of consolation. If he doesn't manage to kill himself over this, at least Kanda will.</p>"""
