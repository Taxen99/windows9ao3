[[fics]]
title = "Coffee"
authorid = 102
date = "2001/08/29"
fandom = "Fullmetal Alchemist"
tags = ["comedy", "gen"]
summary = "Edward pranks Roy. Im bad at summaries just read it"
language = "English"
views = 65
category = "Movie"

[[fics.chapters]]
text = """<p><span>Edward Elric was only 14 years old. He didn’t care what people said about his age. He really didn’t. In fact, it was impressive someone his age had made in into the elite military of his country at all. But, what could he say? He was a genius. Ed liked to brag, but he wasn’t excessive about it like some people. Well, not bragging exactly. He liked to be praised. Doesn't everybody? This was just hard get when he traveled around with his impressive looking brother. Every one always assumed, ‘Well, hey! That’s that kid who got in to the military! Wow! Is that why they call him the ‘Fullmetal Alchemist!’’ and then start praising his brother for it. That wasn’t fair. Of course, Al, being the nice brother he was, always set them straight, and then they’d say ‘What? That little runt?’ and then Ed’d have to kill them. Not that Al ever let him actually kill anyone, but he’d certainly wanted to. He’d certainly tried. Edward Elric would not tolerate being called short. Because, he, Edward Elric, was not short.</span></p><p><span>And then there was his superior. Sure, he had gotten pretty high up in status in a very limited amount of time, but he still had to answer to the Colonel. And, of course that had to be Mustang. Colonel Roy Mustang. Roy just wouldn’t let it drop. Just because Edward was maybe a bit- okay, quite a bit, shorter then Roy, which by no means made Ed short, the Colonel wouldn’t stop messing with him. ‘Oh, is that you Edward? I couldn’t see you over my cup.’ Edward hated him with a fiery passion that could have burnt marshmallows. Lots and lots of marshmallows. Edward couldn’t burn his superior, sadly enough, but he’d feel better when he’d gotten the Colonel back. Why did he have to be stuck with this? Couldn’t he have been sent to a normal superior that took his job seriously? But, Roy Mustang was not an easy person to be caught unaware. He slept with his eyes open for Heavens’ sake. ‘Ed, you’re so short, you could ride a kitten for a horse.’ ‘Shorty.’ ‘Ha ha! Without your weapon, you’re just a little runt who swears a lot.’ ‘Shrimp.’ ‘Hey, Fullmetal, can you hand me that paper up there, or are you too short?’ ‘What’s an elf doing in my office? Oh, sorry Edward, didn’t recognize you there for a second.’ Edward would get him back. He would. But how? ….That was always the question he ended up with.</span></p><p><span>It was just another typical day. Edward had handed his almost finished report to an annoying Mustang, and Mustang was lecturing him. Probably on the unfinished report. Edward had stopped listening some time ago. Hadn’t the Colonel figured out by now, that the lectures weren’t going to do anything? Had he ever handed in a finished report? No. But, at least Ed had finally figured out that it did little good to fight back with Roy. He usually just set himself up for another insult.</span></p><p><span>“You’re almost as short as your report, Fullmetal. You know, you could finish at least one report. It’d make my job a whole lot easier.”</span></p><p><span>Edward sighed, and rested his face on his hand.</span></p><p><span>“Shut it, will you? What do you ever do around here? I heard from Havoc, that you just plan your next date, and take long walks. Always waiting until the last second to hand in your reports. And you’re complaining about mine? At least I got it in on time!” He exclaimed, indignantly.</span></p><p><span>“Yeah? Well, at least mine are finished.” And then he took a sip of his coffee. The browned, almost dusty smelling liquid that didn’t deserve to be called a drink, and yet still was.</span></p><p><span>His coffee.</span></p><p><span>The Alchemist looked up, bewildered. Why hadn’t he though of it before? The coffee! The Colonel always drank coffee in the mornings! Of course! This was a break through. He’d never ever found anything, and he meant anything, consistent about his blithe superior. Ever. But what could he do with this information?</span></p><p><span>Riza Hawkeye. Edward knew that she was always with the Colonel, well, at least in the same building. She seemed to know everything about him, even though she didn’t usually let out much. How could he get her to talk? Had Roy ever offended her in any way? Of course he had. Roy offended everyone at some point and time, other then the Fuhrer, and that was only because the Fuhrer could get him promoted. Or killed. Whichever came first.</span></p><p><span>“Hey, Lieutenant? Is the Colonel allergic to anything?”</span></p><p><span>“Edward? Why…. do you want to know?” the sharpshooter asked, skeptically.</span></p><p><span>Edward began to panic. He had to think of something, other then wanting to poison his drink.</span></p><p><span>“I was just curious.” He answered, doing his best to sound inconspicuous, and making sure not to make eye contact. Ed had never been that great of a liar.</span></p><p><span>“Edward, I am not helping you poison Colonel Mustang.” Hawkeye answered dismissively. She began to turn around and finish whatever she had been doing before the blonde had interrupted her, but Edward stopped her again.</span></p><p><span>Edward’s downcast eyes shot up to meet hers. An instant mistake. “W-who said I wanted to poison him?! Why would I want to do that?!”</span></p><p><span>Riza sighed and looked away, continuing to shift a disorderly pile of papers, most of which looked blank. “Edward, you need to work on you’re lying.”</span></p><p><span>“W-what?! W-who said I was-”</span></p><p><span>“Paprika.”</span></p><p><span>The alchemist blinked. “Huh?”</span></p><p><span>The Lieutenant sighed again, looking bored. “Paprika, Edward. Paprika. It makes the Colonel break out into itchy red spots. Not a happy sight. He moans, and goes on about it for days.”</span></p><p><span>Edward glared at her dubiously. Nothing with Riza Hawkeye was ever that easy. He knew from experience. “Why are you telling me this?”</span></p><p><span>Riza set down the extracted stack of papers into a second pile and looked at him directly with a to-the-point-with-the-slow-fool look. “Do you know who makes his coffee?”</span></p><p><span>“Um, what?” Edward thought a moment. “Uh….. You?”</span></p><p><span>“Exactly. Do you know how many years I’ve been making his coffee?”</span></p><p><span>“Um…. A lot?” The elder Elric blinked. Just where was this going?</span></p><p><span>“Yes. And do you know what’s entailed in my job description?”</span></p><p><span>The shorter blonde was stumped at this one. “……..No?” Edward cringed after he had answered, knowing it had not been the right one.</span></p><p><span>Surprisingly, Riza didn’t lash out at him like he thought she would. She just shrugged. “Well, it’s a long contract. But, I’ll tell you this. It does not include me making coffee twice a day every day for an ungrateful Colonel. That’s why I’m telling you this, Edward. He has his second cup of coffee at twelve, and I won’t be there to deliver it. If you want to be the one to give it to him, be my guest. I’m through. Oh, and put two tablespoons of sugar, and some of that vanilla sweetener in it. And make sure it’s in one of those cups with the blue rim. Got that?”</span></p><p><span>Edward blinked again, before a small malicious smirk began to creep its way onto his featured. “Got it.” he answered confidently,</span></p><p><span>“Good. You don’t have much time.” She turned back to her work.</span></p><p><span>Edward began to walk out of the room, when Riza stopped him again. “Oh, and Edward?”</span></p><p><span>“…Yes?”</span></p><p><span>“Good luck. And give Roy my love, would you?” There was no sarcastic note in her voice. Her tone hadn’t changed in the entire time the shorter military employee had talked to her.</span></p><p><span>Edward grinned. “Sure thing.”</span></p><p><span>Riza Hawkeye was more manipulative then people gave her credit for.</span></p><p><span>The blonde turned away again, and ambled out of the room, and air of confident arrogance about him.</span></p><p><span>Twelve. That was in about twenty minutes. He should be able to find a bottle of paprika by then.</span></p><p><span>…..Or whatever it was that paprika came in.</span></p><p><span>&lt;p&gt;&amp;nbsp&lt;/p&gt;</span></p><p><br><br></p><p><span>Edward Elric had found the paprika. He had gotten the coffee. He had even placed a generous amount into the dark brown now even more fowl smelling liquid. Generous, per say, meaning the whole rest of the bottle. And now he was standing in front of the Colonel’s office. But, Ed had just thought of something. He couldn’t deliver the coffee himself. Then, the Colonel would know it had been him. That was why Riza had given the job to him. If he hadn’t have been so worried and mad at the elder blond, he would have commended her on her brilliance. For, she was brilliant. Who else would have thought of something like that? What was he going to do? What could he-</span></p><p><span>“Edward?”</span></p><p><span>He looked up. Yes, grudgingly, up. But he still wasn’t short. It was Havoc. Yet another giant in the military community. What did- Havoc. This was perfect. All he had to do was the exact same thing Riza had done to him.</span></p><p><span>“Hey, Havoc?”</span></p><p><span>Havoc scratched his head.</span></p><p><span>“Yeah?”</span></p><p><span>“You know how the Colonel and I don’t get along, right?”</span></p><p><span>He blinked. Obviously, he had no idea where this conversation was going. So far so good. This was almost exactly the same reaction Riza had been getting from Edward earlier.</span></p><p><span>“…. Yeah?”</span></p><p><span>“Well, Riza asked me to deliver his coffee, and I don’t want to see him again so soon, so…”</span></p><p><span>“You want me to give it to him?”</span></p><p><span>Edward smiled sweetly. Well, as sweetly as a short teen with evil intentions and plans of getting a smoking Lieutenant murdered could smile without looking apprehensive. “Yes, please.”</span></p><p><span>&nbsp;</span></p><p><span>&nbsp;</span></p><p><span>“What’d you do, poison it?”</span></p><p><span>Ah, so he’d been caught. He’d have to take lessons from the sharpshooter and figure out how she did it. “…….Maybe.”</span></p><p><span>The taller man shrugged. “Okay.”</span></p><p><span>Edward blinked. That was all? It was that easy? Had it been that easy for Hawkeye too?</span></p><p><span>Yes, he grudgingly admitted, it had been that easy for Hawkeye too. ….But maybe she’d just had an overly willing suicidal victim that didn’t think things through.</span></p><p><span>Jean Havoc took the steaming blue rimmed cup from Edward, and entered the darkened room that held his more then likely horrid fate with out another word. The alchemist silently prayed for Jean’s soul. Or rather, what was going to be left of it. Did the soul blow up along with the body? In any case, he’d been a good man, Ed thought.</span></p><p><span>Edward waited. He didn’t have to wait long.</span></p><p><span>Not even seconds later, the Lieutenant ran from the room, and angered screams followed him.</span></p><p><span>“Havoc, what did you do?!”</span></p><p><span>Ed ran after Jean, as quickly as his short legs could carry him, grinning like an idiot.</span></p><p><span>“Yes, Ed, what’d you do to that coffee?”</span></p><p><span>Havoc smirked.</span></p><p><span>“I’m not telling!”</span></p><p><span>Elric grinned.</span></p><p><span>Mission accomplished. And he wouldn’t even have to write a report.</span></p>"""

