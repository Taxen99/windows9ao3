text = """<p><span>At first it was a slight growling, muffled by the boarded windows. Tsukishima was rummaging through the cupboards, grabbing the few salvageable cans left. He counted up each one, trying to figure out how long they could stay here until they’d run out of supplies. He was already used to the chilling new reality, accepting his fate of becoming monsters no better than the ones out there. He killed for this safeplace. It was a man and a woman, struggling to stay alive. Yet he wouldn’t mention that to Yamaguchi.</span></p><p><span>“Yamaguchi, are you done with the bedroom?” He shouted, his voice carrying through the thin walls. The only response he got was an increase of shuffling outside. Maybe Yamaguchi found a pair of headphones. Tsukishima would love to listen to music again. Instead, he was stuck listening to that goddamn growling all day. Sighing, he grabbed another can to add to the stack. He got up from his knees and yawned before hearing footsteps in the hallway.</span></p><p><span>“Did you find anything?” He turned the corner, stopping straight in his tracks as the figure in front of him aimlessly advanced.</span></p><p><span>“Shit.” The door should’ve been barricaded and locked. All that could run through Tsukishima’s mind was the question </span><em><span>how?</span></em><span> He had made sure that none could get in, and the only way to unlock it was from the inside.</span></p><p><span>“Tsukki!” Yamaguchi shouted out, and he grabbed Tsukishima by the wrist, yanking him backwards before he had a chance to turn. Before he knew it he was hiding in the closet with Yamaguchi, barely any light filtering in from the crease of the door. He stayed silent for a bit, nothing audible except the beating of his heart, pumping from the fear for his life.</span><span><br></span><span> “You said you wanted a cat, right? Before all this I mean.”</span></p><p><span>“Yes, but how is that relevant now?” Tsukishima got his answer right away when the light flipped on, and Yamaguchi stood up against him with kitty ears sticking up from a headband he found, matching the brown color of his hair. He had a little collar on his neck, and the bell chimed as he went up and planted a kiss on Tsukishima’s cheek.</span></p><p><span>“Am I close enough?”</span></p>"""

