[[fics.chapters]]
text = """<p>Theo watched his sister and his best friend dance. They would be getting married tomorrow and he honestly couldn’t be happier for them, but he somehow felt as if a piece of him were slowly drifting off. Blaise had his Luna, Draco and Hermione had each other, and then there was Theo.<br>Theo, who’s casual interest in the female species was minimal at best. Who stood by and made jokes about how Blaise and Draco were so whipped, And Theo, who was terrified of becoming his father. Did he want someone? Of course he did, but the very idea of a relationship terrified him to his core, so he settled for pretending. Pretending that he was happy as he was, that he wanted to be wild and free. And he was. He was happy where he was, a great job, wonderful friends, the best family a guy could ask for, and he did want to be wild and free.<br>He just wanted someone to share his happiness with.<br>Theo felt a tap on his shoulder.<br>“What do you…” His voice died out when he realized that it was not in fact Blaise, but instead a very short, and very, very pretty girl.<br>“Dance with me.” She demanded. Theo was a bit taken aback, he’d never had anyone other than his best friends or his sister try and boss him around before. He stared at her, his mind already forming the word no, but then his eyes caught hers.</p>"""

