[[fics.chapters]]
text = """<p>Allen had thought that Lenalee was the best -the only- choice for people he could tell. She was level headed, she was female, she was his friend. He'd thought it'd all work out. He did not think that his female friend would take it upon herself to discover his 'secret crush' if he didn't plan on telling her himself. Miranda had been, what, the third girl this week? Fou, Mary; a finder he'd not actually know existed until two days ago; and Miranda? Yes, that would make three this week. He'd thought Fou was going to murder him. It had been terrifying.</p><p>The ordeal with Mary had just been awkward.</p><p>He'd tried to talk to Lenalee about her troublesome habits several times, actually. The only problem being, that she was always with a crowd and always had a perfect, flawless excuse for removing herself from his presence almost instantaneously. Allen didn't know how she did it, unless she just put off all of her work and chores just so she'd be guaranteed an instant out. It would have been almost admirable if it wasn't so annoying.</p><p>The other thing that bugged him, and this bugged him even more then the Lenalee thing, is that every time Lenalee disappears, she seems to always be replaced with none other then Kanda, the grumpy one.</p><p>He's calling Kanda that now in his head, to try and make himself feel better. Because Kanda just wakes up on the wrong side of the bed. Every day. Really, really early. And he has like, this bird that pecks him awake. Every day. Because Kanda can't have been this way originally. There's no way Allen would have been stupid enough to fall in love with such a jerk. It's just not possible. That'd make him a masochist, now wouldn't it? And he's not. So, Kanda just has a really bad day before Allen sees him. Allen knows how that is. So, Allen forgives him. (Silently, and in the safety of his mind.)</p><p>Back to that. The strange fact that Kanda seems to always appear out of nowhere, just when Lenalee (his semi-safety-catch) vanishes. It's just not natural. It can't be a coincidence.</p><p>But then again, as Allen dismisses the paranoid thought, it has to be, because there's no way that Lenalee knows. No possible way. Allen's tried too hard for that.</p><p>Though he's starting to learn that hard work counts for next to nothing.</p><p>For some reason, that doesn't stop him from trying.</p><p>"Lenalee!" Allen ran with all the speed he could muster. "Wait; Lenalee!" He would catch her this time, she was nearly alone, he had to catch her this time. And look! No Kanda!</p><p>Of course, he had, er, mixed feelings about the missing Kanda part.</p><p>Lenalee looked up thought fully. Allen paled. This was it. She'd found something he'd forgotten, even though he'd spent all day on pointless chores. No, he comforted himself. She'll discover she's got nothing to do. Allen was convinced he'd done them all. He had. ...He had to have. How many errands can be run for one science division?</p><p>Lenalee clapped her hands together, almost triumphantly, purely for show. Allen's hope faltered.</p><p>"That's right!" as if talking to herself, but loud enough that Allen could hear her even from this distance. So, he sped up. "Nii-san asked me to get him a cinnamon roll!"</p><p>Allen's face lost more color, and his pace wavered for a split second. Komui most certainly had not. Allen had been working for Komui all day just in case she tried to sneak in and get an errand. He'd gotten cat food and fed it to Komurin VI whatever; he'd risked his head for this chance. His head! And Komurin... And Lenalee had gone and done it anyway! How... How could she?! Lenalee ran happily off, probing to be much, much faster then Allen could ever hope, and Allen was left feeling somewhat... dejected. Not to mention inferior. It was not a good combination of emotions.</p><p>Especially near the one person he couldn't afford to be around when his guard was down.</p><p>"Oi. Moiyashi. You're blocking the hallway." To his credit, Allen did not jump. Instead, he played mind games with himself, in a meaningless effort to keep himself sane. The thoughts went something like this: That had almost sounded like- but it couldn't be, it had sounded almost nice.</p><p>So yes, Allen did try.</p><p>"Move." His thoughts went as follows: Ah. Never mind.</p><p>So even then, Allen didn't let his guard down too much. Just a little bit. Besides, it had been Lenalee's fault.</p><p>Allen straightened himself out. He wasn't sure if he did it physically , but he certainly did it mentally.</p><p>"Oh, Kanda, ah..." Er, what now? Allen's expression (whatever it happened to be) dropped, and he blinked up at the glaring swards man taking no notice of the glare. What had his plan been? Was he going to argue back, insult, be rude? Was he going to 'tolerate' Kanda's presence and try and annoyed sort of politeness? What was the 'normal' thing to do? That was the important question. Wait, hadn't there been a plan for this sort of this? This... Situation? Hadn't he worked it all out? Where were all of his thoughts going? Why couldn't he think straight? Why did Kanda do this to him? Was it on purpose?</p><p>Why couldn't he answer any of...?</p><p>What was Kanda doing?</p><p>Kanda was... Kanda was walking towards him. Allen blinked as even thoughts of questions failed him.</p><p>Then Kanda was so close Allen could smell him and Allen inhaled deeply, his mind racing to categorize and remember, so when a calloused hand roughly touched his forehead and Allen's breathing stopped altogether, the scent was trapped inside.</p><p>Kanda was touching him, for what ever reason. It didn't matter why. Kanda was touching him. It didn't matter anymore if Kanda decided to kill him over his stupid thoughts, it didn't matter that Kanda hated him. Kanda was touching him, and Allen could die happy now. Allen somewhat unconsciously leaned into the touch, not thinking about how disgusted the other would be, not caring that the hand was rough from careless use. It didn't matter what he felt like. This was Kanda, and Kanda was perfect. If his hands were calloused, (and yes, they most certainly were,) then the whole world's hands should be calloused just like his, because Kanda is perfect, Kanda is everything, Kanda is-</p><p>Kanda made a 'tch'ing noise with his tongue, and said something that sounded harsh and rude and thoughtless and the like as is often the case, but it didn't matter. Kanda was still touching him, Kanda hadn't taken his hand away from his face, so it didn't matter. Kanda could do whatever he wanted to.</p><p>"-ing fever. The hell did I do to deserve this?"</p><p>"Mmm..." Ah, what was Kanda saying? He should probably be listening.</p><p>"Are you even listening, you stupid brat? Can't you even go to the infirmary by yourself? Or will you get yourself lost?"</p><p>...Lost? Hmm... Well, he never did have the best sense of direction.</p><p>"Lost... Yeah." Allen's eyes closed. Kanda could say whatever he wanted to, as long as he didn't move his hand. Well, Allen would probably let him say whatever he wanted to anyways. It wasn't like he ever had a choice.</p><p>"You're stupid face is red, Moiyashi. What the hell did you do? Sleep on the floor?"</p><p>Er, red? Oops. Was he, uh, blushing? He hadn't meant to. Really. "Sorry..." Allen sighed softly. But he soon came to the realization that no one could be this happy for this long and live. It just wasn't physically or mentally possible. Or even if it was, someone, (preferable or not, probably that 'God' he was suppose to be serving) wouldn't allow it, for whatever reason. Maybe to keep the general peace by keeping a general rule of fairness.</p><p>All of this was simply leading up to his next thought: He was going to die now, wasn't he?</p><p>Nobody 'deserved' something like this, (the general rule of fairness and all,) and he was going to pay for it.  Oh well. It had been a nice few minutes. Couple seconds. Whatever.</p><p>And then suddenly, for whatever reason, Allen's feet weer no longer attached to the tiled floor; his body seemed to defy gravity as it rose quickly, giving an almost floating sensation. Then the sensation abruptly left him as he was roughly thrown over a broad shoulder and had now acquired a face full of sleek black hair that somewhat inhibited his breathing as he attempted to not eat the stringy stuff.</p><p>And then they were moving.</p><p>Without thinking of course, Allen began to protest. "H-hey! Put me down, Kanda! I- er, I- Ah!" Kanda had thrown his limp body upwards in a jerky motion, and some bone or other jabbed into his ribs on the way back down. "Jerk!" he spat. "Put me down!"</p><p>Kanda scoffed, almost completely ignoring his complaining load. "Shut up."</p><p>"Let me go! Why would you just let me down?!"</p><p>Kanda shrugged, and Allen suddenly felt unstable as he rocked back and forth. "Why the hell else? Lenalee's stupid brother has my Mugen."</p><p>"All right, fine! So you can't just stab me where I stand, but-" Allen gasped, cutting himself off as Kanda cantered down the stairs and Allen was left grasping for some sort of hand hold on the other man's back. He didn't find one, but neither did he fall.</p><p>"Look brat, I don't know why the hell I'm being made to do this but- hey! What the hell is wrong with you?" Allen had suddenly realized he was being carried by the one person who- oh god, he couldn't even think it- and in a fit of flushes, the heat was suddenly too much for his head.</p>"""
end_notes = "Due to the amount of threats I have received over this fic, I will not be updating it further. To all my loyal readers: sorry. And to all you fucks who threatened me: get a fucking job, bitches!"

