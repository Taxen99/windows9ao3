text = """<p>“Yuu!” was the short shouted notice given before the door was kicked open. The nigh ancient chunk of wood fell to the floor with a thud. No notice was taken. Scanning the room, then practically beaming when the other exorcist was located, the red head held up his load, pridefully showing it off. “Hey, Yuu, wanna-”</p><p>A sharp sword pressed itself against his bare throat. But that was to be expected. It wasn’t like trigger happy Mugen would just stop threatening him any time soon.</p><p>“I told you to knock.” The low voice was a growl, threatening, like his weapon.</p><p>“Yeah, yeah.” Lavi would have laughed if his only throat hadn’t been in the way of a very sharp over-grown stupid toothpick. ‘Course, he’d never call the stupid toothpick that in front of it’s face.</p><p>Knock? Sure. Yeah. That’d certainly get him somewhere. Yuu would never open the door, and he’d just get yelled at from the other side of the thick wood, never able to get his point across. Oh. And he’d kicked down the door, ‘cuz he’d knew it’d be locked. 'Course.</p><p>The slight pressure on his throat was released, as Kanda became interested in other things. Distracted, would be a more accurate word, but who's counting?</p><p>“Is that...? That’s not... alcohol, is it?”</p><p>“Rum.” Lavi’s tone was one like that of gold metal winner, a promoted employee. Not suitable for an intoxication smuggler, and he knew it. But Lavi had almost literally gone through hell to get this. He deserved to be happy. He deserved the rum. He was not going to waste a single drop.</p><p>“Are you.... are you drunk?” Kanda spat the word disdainfully, and Lavi felt a twinge of dismay. But not even the ever-grumpy exorcist’s harsh words could differ his mood. Not in the slightest.</p><p>“Eh,” Lavi grinned, and swung one bottle holding hand over Kanda’s shoulder. “Only just a bit.”</p><p>The menacing growl came again. “Either you are, or you aren’t.”</p><p>“All right, then.” Lavi thought for a moment, then grinned exponentially again. “Totally plastered, eh, Yuu?”</p><p>Severely amused when the word ‘plastered’ seemed to annoy Yuu even more, Lavi waltzed unevenly into the dark foreboding room, and as he always did, took no notice of the death glares he was receiving.</p><p>“Fine. So you’re...drunk.” Kanda said the word grudgingly. “Why the hell are you here?”</p><p>Lavi frowned slightly. Only slightly. It’d been a bad week. Not just any ordinary bad week, an extremely bad week. Not just for him either. Every one was suffering in one way or another. Even Bookman. And if Bookman was suffering, Lavi was sure as hell going to pay. Not just that, though. There were other things too. Things that shouldn’t have gotten to him, but somehow wormed their way into Lavi’s suppose-to-be non-existent heart. And it hurt. But all that aside...</p><p>Who needs a reason to get drunk?</p><p>Lavi grinned full force again, and plopped down on the hard floor of the blackened room, the liquid in the dark bottle sloshing around violently, some spilling over the top. Ah. Well, there went the drops he wasn’t going to waste.</p><p>Kanda was not pleased.</p><p>“Wanna drink some rum?” This was a special occasion. Lavi didn’t offer his precious depleting supply of alcohol to just anyone. And Kanda in turn, Lavi knew, never accepted alcohol of any kind from anyone, period. Stupid morals. Something about the thought of being out of your right state of mind, and not being able to control yourself to your full ability was appalling to him. Something about ‘the pride of a samurai.’ Along those lines, anyway. Seriously though, who cares about pride when you're drunk? What's there to care about when you're drunk? But it wasn’t like Lavi drank every chance he got. He wasn’t some sort of addict. In fact, he’d only really gotten drunk, what, five times now? Oh. Well, this’ll make six.</p><p>Lavi raised a bottle again. “So, how about it, Yuu?” And to be fair, Lavi wasn’t even slurring his words. Yet.</p><p>Kanda sighed, and sat down next to the slightly swaying teen, taking the offered beverage in one smooth motion.</p><p>“...Whatever.” Lavi grinned, and held up the other bottle for a toast.</p><p>“I’ve always wanted a drinking buddy. Let’s drink to that.”</p><p>“Che.” But Kanda took a sip. “But only for now.” he cautioned, almost as an after thought.</p><p>It had been a bad week.</p><p>++</p><p>“Le’s toas’ ta tha’ one guy.” This had to be their hundredth toast. Or maybe it was the three hundredth. A lot of toasts. A lot of rum. Rum was great. Alright, so he’d admit it, he was having trouble talking right now. But he felt great. Sure, every thing was spinning, but the colors were pretty.</p><p>“Which... one?” If nothing else, Lavi had learned that Kanda was more talkative drunk then sober. Maybe he'd even get to remember his newly discovered fact in the morning.</p><p>Kanda seemed to have trouble thinking of the different words, while Lavi couldn’t seem to get them out fast enough.</p><p>“Ya know. Thah finde' wi’ ta b'wown ‘air? Funny mo’ha’ loo’in’ thin’?” Lavi had never been so drunk in his life. He was sure of that. He couldn’t tell if he was grinning any more. He couldn't really remember how to work his face.</p><p>“Oh... Yeah. I dun’ like ‘im.” Lavi thought Yuu was taking to the alcohol extremely well, considering the amount they’d both had.</p><p>Lavi snorted. “You dun’ like anyone.” Yuu shrugged.</p><p>“Che.” The noise was considerably less harsh then it’s sober counterpart. “That one’s... ex'ra annoying.”</p><p>Lavi grinned. At least, he thought he grinned. He tried to grin. He couldn’t really feel the muscles in his face anymore. “Can’ ar’ue wi’ tha’.” The remaining fluid in the last two containers swished weakly, and then was promptly drained. Lavi was pretty sure he frowned when nothing more came out, and tipped the bottle upside down, shaking it for anything he missed. Nothing. He was vaguely aware of Kanda across from him leaning up against the bed mimicking his motions.</p><p>“No mo’ rum.” Lavi confirmed, quickly sinking into a alcoholic induced depression. Now what? With out the rum...</p><p>“’s gone?” Kanda echoed sadly. Lavi sighed, and nodded, throwing the bottle in the small pile that had accumulated by the doorway.</p><p>Lavi tried to grin again. “Thin’ we’ll re’ret this ‘n th’ mornin’?”</p><p>Kanda smiled a small drunken smile, but it was a smile. The Kanda Yuu. Smiling. The world was going to end. Ah well. At least they wouldn't have to feel it. “Nah.”</p><p>Lavi smiled back, and then blacked out.</p><p>++</p><p>They were both wrong about the regret part. They certainly regretted it, when they both threw up, and had to share the same toilet. Kanda had finally realized he should have kicked Lavi out while he was still conscious. Lavi was grateful for the lack of strength to do it now. The splitting headache for hours on end didn’t help much in the category of redeeming qualities either. And the light. The stupid freakin' light. Who the hell invented the sun?</p><p>Oh yes, they’d regretted it greatly, wishing they’d die, or at least have enough strength to kill the other so they could be alone in their suffering, but to no avail.</p><p>Lavi was pretty sure Yuu had it worse. After all, it had been his first time really drinking. At least Lavi had some idea of what to expect. Lavi snickered, then grimaced when a sharp pain erupted from near his ear. Poor, poor Yuu. Not that he didn't deserve it, of course.</p><p>Now they lay on opposite ends of the small room, Kanda ordering him to get out, but lacking his giant, what had he called it last night? It was all a bit of a blur. A giant hair pin? Anyways, Mugen was unsurprisingly absent from the hands threatening to strangle him if he ever got with in range. Lavi recovered first, and left in search of pain killers. It had been a miserable morning. But it could have been worse, and in an odd sense of the word, Lavi had enjoyed it. All of it. Having a drinking buddy was better then he’d ever though it could have been. More amusing. And he’d gotten Yuu to talk more in the last twelve hours then he had in his entire last year in the Black Order. He actually felt pretty good about that. It was a certain kind of accomplishment. Sure, he didn't remember what had been said anymore, but hey. Medals are medals.</p><p>All in all, it wasn’t enough regret to stop either of the adolescents from doing it again.</p><p>++</p><p>Fifteen of the best finders dead, and one exorcist. Two exorcists critically injured, and a certain raven haired girl had been missing for three days. Nothing but a tense atmosphere from everyone but old man panda, and Lavi couldn't take the stupid worry worts. Lavi did not worry. It was not part of what he was suppose to be. He was suppose to be the ever pleasant and happy onlooker. That's who 'Lavi' was. He wasn't allowed to worry about stupid humans on the losing side of a war. He had to pretend to worry, but actually worry? That's for people who actually care. He felt sick all the time, but it couldn't be from worry. Of course not. Must've been something in that food from Morocco. He was the book man's successor. He couldn't waste his time worrying about stupid, war waging humans. And so, with all the rum from old man panda's room mysteriously disappeared, Lavi had to resort to the whiskey in the basement. Only three bottles this time, but Lavi figured they'd manage. It had nothing to do with dead people, or missing people. It had nothing to do with people at all. Lavi was just bored. Of course he was. Lenalee wasn't around to talk to, and no one else really wanted to bother right now. It wasn't the appropriate time for talking. Not that he missed it, the pointless, endless banter.</p><p>Not bothering to knock, but barging uninvited through the door easily (because the lock still hadn't been fixed), Lavi greeted Yuu with another giant grin. "Look, Yuu!" He got a growl in response. "No rum, but I figure this ought to be about as good."</p><p>"No, stupid. I said just that once. Besides, didn't I tell you never to mencion anything about, it ever again? And stop calling me that." Kanda glared, and the expression of joy on the other exorcist's face drooped slightly.</p><p>"But Yuu! I went to all that trouble!"</p><p>Yuu glowered at him for a second longer, but walked over to roughly take a bottle. "It's Kanda."</p><p>The hallway was checked, the door was closed and re-enforced with a chair, both boys sat down on the floor across from each other and the corks from two of the bottles were popped of softly.</p><p>"Bottoms up!" Lavi silently congratulated himself while the grin returned. Almost in sync, both swallowed a large amount of the almost foul smelling liquid. Then they both gagged and spit out as much of it as they could.</p><p>"What the hell is this, you stupid bookman?!" Kanda had managed to clear out the majority of his mouth before Lavi. In desperation, Lavi tried to rub off his tongue on the collar of his sleeve.</p><p>"I was... I thought..." he sputtered out.</p><p>"Some sort of poisoned fuel from one of Kamui's stupid experiments?!" Kanda had uncovered a bottle of water, and drained it all in one gulp.</p><p>"Ah... My mouth is going to die..." More his throat then anything. It was burning. What had he just put down his throat? Ah! Now it was slithering down his throat and into his lungs! What the hell had they just done? Still complaining, Lavi laid down on the floor, and Kanda got up to kick him.</p><p>"Look at the label, idiot! It's got tape over it! Do you know what this says?!"</p><p>Lavi grinned, despite the horror he was about to face and the pain he was already facing. He couldn't help it. "Er, 'do not open until Christmas'?"</p><p>"Stupid-!" Kanda valiently managed to restrain himself. Lavi considered claping. "Look at it!"</p><p>Lavi laughed.</p><p>Lavi looked. Lavi paled.</p><p>So, the second drinking buddy experience was not a pleasant one. Though both could say that neither one of them threw up.</p><p>-They didn't dare.-</p><p>Lavi did get a few impressive bruises, though. It may have sort-of been his fault, but...</p><p>-But this was the first time he wasn't able to go to Lenalee and complain.-</p><p>++</p><p>He'd imagined it though. The conversation. He'd call out Lenalee's name, and grin while saying Yuu-chan was being a meanie. Yuu would threaten to kill him if he didn't stop calling him that, and Lenalee would laugh. So predictable. The stupid humans. The stupid war-waging neanderthals.</p><p>And, no, he didn’t care. Not one bit. It was all just a part of history. Someday, he’d be far away, mentally  recording unrecorded history, history that wasn’t allowed to be recorded, as a full-fledged Bookman, without old man panda over his shoulder (in a sense), his every move, just waiting for him to screw up. He’d be free, with out any attachments, and all of these people he’d known would be long gone. Just on another mental list of the dead. So what did he care? Nothing at all. They weren’t his friends. Lavi truly had no idea what was going on in their heads when they had spouted that stupid term. They weren’t his comrades. Bookman is not allowed to have either. So it was just as well that Lenalee was probably dead somewhere on the eastern coast of Africa, because then she wouldn’t have to kid herself about Lavi being her friend anymore. It just made it that much simpler.</p><p>So, with the resolution that he was better off with her dead, Lavi gathered up the booze and headed towards Kanda’s room. It had nothing to do with Lenalee at all.</p><p>A small, travel size twelve pack this time. Lavi wasn't sure what it was, the German scrawl on the side of the box was nearly illegible to him, even though he knew perfectly well how to read German, but the best was suppose to come from Germany so who cared? Yuu would get over it.</p><p>'Course he would.</p><p>He hadn't begun to drink yet, but he still waltzed happily up to Yuu's door, and since it happened to be open, entered without consent.</p><p>"What the hell-"</p><p>"Lookit, Yuu-chan! It's in a box, so it can't be-"</p><p>"Shut up. Go away."</p><p>Lavi looked down at Kanda, who was sitting on the floor facing the wall for reasons unknown to him. It didn't really matter, but...</p><p>"Oi, what're ya doin' down there, Yuu?"</p><p>Kanda scoffed, staring at the wall. "None of you business, idiot. And stop calling me that. Leave me alone."</p><p>"Eh? Where's Mugen, Yuu?"</p><p>The swordsman growled. Lavi didn't even flinch. "Stop asking me stupid questions, and go away!"</p><p>Lavi grinned, set down the heavy box he'd been holding up for Yuu to see, and then continued the swift and unwanted motion, sitting down next to Kanda's unusual spot on the floor. "Wanna talk?"</p><p>"Hell, no. Leave."</p><p>"Aww, Yuu-chan doesn't like me anymore?"</p><p>Kanda scoffed lightly, the closest Lavi could ever get to a laugh, if a sarcastic one. "I've never liked you."</p><p>Lavi, still grinning, shrugged. "And I've never let that stop me before. Now!" He picked up the box again, making sure Kanda could see it, and sure enough, Kanda glanced over. "Want some?"</p><p>His shorter friend eyed the box suspiciously. "No."</p><p>"Alright, fair enough. How 'bout I take the first drink, and you can see if I die?"</p><p>Kanda- was that what Lavi thought it was? Was that a smile? No, more of a smirk. Alright, so a sarcastic smile, and a sarcastic laugh. Still, it was more then he'd ever gotten before. "I might actually enjoy that."</p><p>Lavi opened the box with a sort of masochistic glee, and popped open a bottle with the end of his hammer. He downed a swig, as Kanda watched in what could have been called interest from a biased point of view. The red head was biased.</p><p>Lavi considered the taste for a moment. Rum was better. "Well, Yuu? I'm not dead. Want one?" Lavi pushed the box towards Yuu, and grunting, the grump took one, popping the bottle cap off roughly with his thumb, causing it to bleed.</p><p>"You could have asked me to do that, ya know." the red head mused.</p><p>Kanda glared, "Shut up." and proceeded to drink deeply.</p><p>"Whoa, Yuu, slow down." Not that he was conserned or anything. He just wanted there to be some left for him.</p><p>Stopping only briefly to glare again, "Don't call me that." was said, and Lavi's advice was ignored.</p><p>Lavi had a strong urge to 'che' mockingly, which he ignored because he didn't have a death wish, and shrugged. He simply sipped at his drink, finding that watching Yuu was much more entertaining then drinking whatever it was that he'd 'picked up'. In the loosest sense of the phrase, of course.</p><p>Lavi waited a while, until Kanda was on his second and was almost certainly drunk, hesitated for a moment, (but only a moment, because this is Lavi) and then decided to ask softly, "You alright, Yuu?"</p><p>Kanda responded with rude, mumbled words that probably shouldn't be recorded, followed by a sarcastic 'perfect'. But this being Lavi, and Lavi was curious, the questioning didn't stop there.</p><p>"Aw, com'on, Yuu! What's eatin' ya?"</p><p>"Nothing, you stupid, stupid- stupid..."</p><p>"Run out a words, Yuu?"</p><p>"Don't call me that, idiot." and then a metaphorical light shown in Kanda's eyes. "I figured it out."</p><p>"Figured what out, Yuu? You're drunk. You can still think things through?"</p><p>"Shut up. I'm not that drunk. And I'm not stupid, like you." Kanda paused for a moment, seeming to be still thinking his new revelation through. "You're a rabbit."</p><p>Well, that hadn't been expected. "Er, sorry, but I'm a what?"</p><p>"You're a rabbit," Kanda explained, seeming very cooperative now that his defenses were down from the German drink. "I couldn't figure out what it was that you acted like before, but it's a rabbit. When you try to sneak around, or even when you talk. You act like a stupid rabbit. Even your stupid name..."</p><p>Lavi grinned, and had another sip out of his bottle. Still his first, probably. Maybe this stuff was better then he thought. "What's so bad 'bout rabbits?"</p><p>Kanda shrugged. "What's the use of a rabbit?"</p><p>"Well, you can sell 'em."</p><p>"Well, we can't sell you." It sounded as if he had tried before.</p><p>"Fine, I'll the rabbit, and you'll just be 'Yuu'. Unless you want to be Alice." Kanda growled. Lavi laughed. "So, Yuu-chan, gonna tell me what's wrong?" If something was getting to the other teen, Lavi would file it away for future inspection. By the way, where was that tooth-pick?</p><p>"Nothing's wrong, s'upid rabbi'." Lavi blinked. He blinked again, and rubbed his eyes. Was it just him, or was Yuu-chan getting blurry? "I don't care." he added, seemingly for good measure.</p><p>"Nei'her do I." Lavi agreed.</p><p>And for a brief second, they understood each other. Neither of them cared. Neither of them wanted to care. The same thing that was wrong with Yuu was 'wrong' with Lavi. And in a drunken moment of insight, that made sense. To both of them, Lavi hoped.</p><p>"Lenalee,  sh's sdoopi'."</p><p>"Yeah," Lavi agreed again. "Girls are s'upid. Why should we care?"</p><p>"She braw id on 'erself."</p><p>"'Course she did."</p><p>For that moment, Lavi wasn't dancing dangerously around his self-proclaimed best friend's head, around anyone, narrowly avoiding cutting too deeply with his words or saying anything that might bind him too closely with anyone, cautiously side-stepping a lazily lunging, deadly, usually angry Kanda. It was like they'd both come to the same realization at the same time, a 'what are we doing?' kind of thought, blinked at each other, and just sat down. Just like that. They weren't fighting anymore, or trying to get the other to snap. Lavi wasn't teasing Yuu, and Yuu wasn't being cold and distant, the two distinctive traits they could always count on each other for. And just like that, it was gone. And the worst part was, Lavi almost preferred it that way.</p><p>He could literally feel his defenses falling, the defenses that had been in place since before he could remember. He knew if he didn't stop this soon, he wouldn't be able to go back, wouldn't be able to put the facade back up. He had to fix himself.</p><p>But if felt nice to not pretend, to step off the stage, if only for a moment. To not smile when it was  sometimes killing him to do so.</p><p>So he'd let his defenses drop, his lessons be forgotten- but only for now. He was drunk anyways, who would know? Only for a little while. He'd be alright if it was only for now.</p><p>"'ey, Yuu, what're your thoughts on people?"</p><p>Yuu snorted. "They suck." And it was the most coherent thing he'd said in over an hour.</p><p>Lavi grinned openly, the alcohol taking effect. "Yer not so bad fer an ink blot."</p><p>Kanda raised a drunken eyebrow. "A wha'? Ne'er mind, s'oopid rabbi'. I dun wanna know."</p><p>Lavi chuckled. "Didn' think ya would." It didn't matter anyway.</p><p>++</p><p>When Lavi woke up from the alcoholic induced sleep he didn't even remember having, Lavi decided, against his better judgment, to wait until Yuu woke up. Lavi figured his head didn't hurt as much as it probably should have, and he didn't feel overly nauseous, but Yuu still wouldn't be happy with him. So he should've just left. But he didn't.</p><p>Finally, Yuu blinked his eyes sleepily, indicating that he was probably awake. Lavi'd been waiting for an hour. Then the almost panic set in.</p><p>He didn't know why he stayed.</p><p>"Yuu! Er, how ya feelin'?" That had been a pathetic attempt at normality, and Lavi knew it. Of course, he could always hope Yuu didn't remember last night. Lavi had been trained for his memory, and he barely remembered it. Or did he want Yuu to remember? It didn't really matter what he wanted, either way. If Yuu happened to not remember, he'd change his mind about what would be best.</p><p>"Che." Kanda glared. Well, that was no surprise.</p><p>Lavi grinned, almost abashedly, every part of his mind telling him not to face that glare, and most defiantly not to ask. He did both. "Uh, you don't, that is, you wouldn't...? Er, would it be okay if, uh, I..."</p><p>"Che." Kanda repeated, sounding annoyed, and looked away. "Do what ever you want. I don't care."</p><p>Lavi chalked it all up to not wanting Bookman to see him and automatically know what he was doing last night. And that Yuu probably expected him to hold his hair back if he threw up or something, because it was somewhat Lavi's fault they were in this mess. Not that Lavi would ever take any credit. "Er, thanks, I guess?"</p><p>Yuu didn't look at him. "Whatever." Of which, the red head took to mean as 'I simply do not have the required ammount of energy to successfully kick you out', followed by and including a great deal of profanity.</p><p>Lavi didn't know why he stayed. Lavi didn't know why Kanda let him.</p><p>All he knew, was that 'for now' was getting longer, and 'forever' was not as long as it use to be.</p>"""

