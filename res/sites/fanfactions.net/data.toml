[[fics.chapters]]
text = """<p>Well, that was the plan. At least, he had a plan.</p><p>It was killing him to not talk to anyone about this. He didn't think it would, he thought he'd be fine. It had seemed like he'd be fine. Obviously, he'd overlooked something.</p><p>That something would not be Lavi. That someone would not be Lavi. Anyways, why would it be? Besides, Lavi doesn't know anything. Lavi really really doesn't know.</p><p>"Lenalee?"</p><p>The girl briefly looked startled at being spoken to, before recovering and smiling cautiously. Allen supposed this was mostly his fault. He hadn't been talking to much of anyone recently, and suddenly talking of his own accord after approximately two weeks might have shocked her. It had taken him three weeks to figure out that keeping everything in wasn't the best idea. Just two weeks of serious thinking.<br>"What is it, Allen?"</p><p>Allen actually does realize that he's been a bit bipolar recently, and he recognized the look in Lenalee's eyes as curiosity more then the usual pity and confusion. "Well, you see..." Was there any good way to say this? "Er, I was wondering..." He found himself looking away, no longer able to meet her eyes. Maybe this would be easier if he pretended she wasn't there and he was just talking to himself. He was beginning to dig his own grave, wasn't he? He sighed. "Have you ever, uh, loved anyone?" He was almost hoping that his voice had gotten quiet enough so that she couldn't hear him, and he risked a glance at her face. She looked confused.</p><p>"Of course, Allen. I love everyone in the Order." So she had heard. And completely misunderstood.</p><p>Allen cringed. That wasn't the point he'd been aiming for. "Er, no, Lenalee, I mean, uh," Allen swore in his head, and Allen usually tries to make it a point not to swear. "like, uh, romantically?" he finally managed to squeak out.</p><p>Lenalee blinked. She repeated the hated word in a questioning tone that was much too loud for Allen, and he had a strong urge to clamp her mouth shut and shush her; but he didn't. He controlled himself very well. Instead, she covered her mouth with her own hands, and a squealed muffled noise escaped while a giant beaming smile became evident on her face. Allen began to think that maybe this wasn't the best idea after all, and turned his face shamefully to the ground. In contrast, Lenalee was the happiest he'd seen her in weeks.</p><p>"You're- oh, that's- We were so worried, Allen! I mean, Lavi said-"Allen cringed at the name. So he had figured out too much. "-but I didn't believe him, and then you- and that makes so much sense! Oh, Allen," gratefully, she lowered her voice to a murmur, and leaned over to his bent head. "It's not me, is it?"</p><p>And just like that, the guilt was back. Allen looked up quickly, blushing slightly. "N-no! I-I'm sorry, I'm so sorry, it-it's not you, it's- er, not, uh, you..." It's Yuu, it's Yuu! He wanted to scream it, and hide his face in shame, he wanted someone to know, he wanted this whole thing to be over with already. He wanted to cry, and confess that he couldn't deal with this, that it was killing him inside, that he didn't know how to handle it and he needed help. Allen needs someone to understand so badly. But he can't tell. That would ruin everything he's built back up. It would ruin everything. He'd almost messed up. He'd almost told. But it would be so easy to just tell her. Just to come clean and tell her the name of the stupid person who unknowingly held and crushed his heart a little more every single day. The one who had successfully taken away any hope he'd ever had of being normal, of being with Lenalee, if that's what she wanted. It wouldn't take much. Just that one little name that'd been haunting his mind ever since, well, who knows when.</p><p>"Ah, don't be. So, who is it then?" Still her bubbly polite self, Lenalee was not put off by the news that she didn't have a 'secret admirer'.</p><p>Well, that was good, wasn't it? Still, Allen couldn't risk answering.</p><p>Allen went with the simplest answer when he told Lenalee he'd be too embarrassed to tell her, and she didn't push him anymore.</p><p>Of course, that was when he should have suspected something.</p>"""
