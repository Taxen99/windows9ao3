text = """Get out. Get right out of here now. "slight Lavi/Yuu" you say? There is no such thing a "slight" shipping. How could you even think such a thought; that just because you only poured <i>half</i> a cup of you own piss into our food, we wouldn't notice the foul taste? Romance is a contract, it belongs in the real world, with real people, not in your sick fantasies. Have you asked this Lavi and this Yuu for consent to ship them? Didn't think so. You are literally commiting sexual assault. You should feel shame for your actions!"""

