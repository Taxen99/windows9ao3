start_notes = """who ever refered to my last work as "shiptard behaviour" needs to get a grip"""
text = """<p><span>Hermione walked up to the door of her foster home. She hated this place, Merlin did she hate this place. She missed her parents, her sisters.</span><span><br></span><span> “Hermione Darling!” Her foster mother greeted her at the door. Hermione hated how her name sounded coming from Monica’s ruby lips. She’d always thought her name was beautiful, yet Monica made it sound as oily and gross as the lipstick she wore. Thank God this was the last summer she would be spending here. As soon as her 17th birthday came in the fall, she would never have to see this stupid place again. Hermione gave the woman a wan smile to disguise the disgust.</span><span><br></span><span> “Hello Monica.” Monica’s daughter, and Hermione’s foster sister chewed bubblegum loudly to her left.</span><span><br></span><span> “Hello freak.” Clarissa said, popping the gum in her face. Clarissa was 16, same as Hermione, however, she was more interested in boys than books and never ceased to tease Hermione about it. If Hermione was being honest with herself, living with Monica and Clarissa wasn’t all that bad, but Monica’s false care and Clarissa’s constant jabs began to hurt after a while. Especially when she compared them with her own parent’s unfailing patience and kindness and her sister’s loving infatuation.</span><span><br></span><span><br></span><span>Hermione shrugged her bag off her shoulder when she reached her room. The worst part about living here was the distinct lack of magic. She may be under age until September, but at least when she went to the Burrow or Diagon Alley she could feel it. For Hermione, magic was a very real presence and when she was around it, she could feel it in the air and settling on her skin. She could even feel her own magic resting inside her sometimes. It was the only thing that kept her sane when she wasn’t in the wizarding world.</span><span><br></span><span> She often wondered what she felt like in magic, but she always thought it would be weird to ask Theo. Theo, who wouldn’t be getting there for another two weeks. She wondered how she could survive without him.</span><span><br></span> <span>Hermione took a deep breath and let it out slowly. She had been very high on the underage watch list after the break into the Ministry that spring. Before that, she could get away with using a bit of magic here and there, so long as there were no muggles within a certain radius. She kind of felt bad about that, as now Theo couldn’t use any magic either.</span><span><br></span> <span>“So Freak.” Hermione turned around at the sound of Clarissa’s voice.</span><span><br></span> <span>“Yes?” She asked suspiciously. Clarissa liked to pretend she didn’t exist unless they were in public, why was she seeking Hermione out? Clarissa and Monica were new. She and Theo had lived in a much larger foster home until two summers ago, and while this one was much quieter and easier for studying, Hermione sometimes missed the hustle and bustle of having dozens of kids underfoot.</span><span><br></span> <span>“Are there any hot guys at that special boarding school of yours?” Hermione shrugged as she put clothes away.</span><span><br></span> <span>“A few.” Clarissa snorted in a way that reminded Hermione of Umbridge.</span><span><br></span> <span>“As if you would know who was hot or not. Ha!” She wandered back out of Hermione’s room and Hermione had to restrain her eye roll. Her foster sister was so thick sometimes.</span><span><br></span> <span>It wasn’t until dinner that Hermione understood the reason for Clarissa’s inquiry.</span><span><br></span> <span>“So mum. There’s this super hot guy that I met at the cafe with the girls today. He’s like super smart and is always talking about stuff that I don’t understand. Like physics and stuff. And he said he went to Hermione’s nerd school. He seemed surprised I’d heard of it. Isn’t that cool?” Hermione watched her cousin with interest.</span><span><br></span> <span>“What was his name?” Hermione asked “Maybe I know him.” She snorted again</span><span><br></span> <span>“You? know someone that hot? Not likely.” Hermione shrugged and went back to eating, maybe it was someone she knew, she desperately wanted some magical company this week. More than anything.</span><span><br></span><span><br></span> <span>Draco was sick of everything. He knew there was no escape from it now, not with his crazy Aunt Bellatrix living in the manor, and definitely not with the Dark Lord coming back into power. All he wanted to do was escape his cruel reality and maybe travel, maybe leave the wizarding world for good. Who knows, as long as it wasn’t there. He wandered back into the muggle village that had become his refuge in past years.</span><span><br></span> <span>He never actually did much in these trips, mostly wandered around, observing muggle life and generally trying to not make a fool of himself. It was fun for him, a challenge. It did, however, cause issues when he was trying to convince his parents, his aunt and practically the whole of Hogwarts that he was just as prejudiced as before. It was exhausting really.</span><span><br></span> <span>He walked into the cafe he had visited yesterday, praying that the obnoxious girl he had met the day before had not returned. To his annoyance he discovered that not only had she returned, but she had brought a friend. He was going to turn around and walk right back out before she spotted him, when he saw something that made him pause. The girl that- what’s her name? Clarissa- brought with her turned around and caught his eye. They stared at one another for several moments before Draco decided he couldn’t write it off as a mistake, and instead put on his mask and fully entered the cafe.</span><span><br></span> <span>“Oh it’s you!” Clarissa followed her friend’s line of sight. Draco stifled his look of irritation.</span><span><br></span> <span>“Clarissa is it?”</span><span><br></span> <span>“Ooh you remember!” Her friend let out the eye roll he was holding back.</span><span><br></span> <span>“Oh, this is my foster sister. She goes to your school!”</span><span><br></span> <span>“I’m aware. Granger.”</span><span><br></span> <span>“Malfoy.” she replied stoically.</span><span><br></span> <span>“Oh. My. God. Hermione you never said you knew anyone hot at school!” Hermione rolled her eyes and Draco had a hard time fighting his smirk.</span><span><br></span> <span>“Actually I said I knew several hot guys. You didn’t believe me.” Clarissa flipped her hair over her shoulder and spun back to face Draco.</span><span><br></span> <span>“So why are you back so soon?” Draco watched Hermione’s face as he answered, desperate for her to understand. He was just so tired of being alone.</span><span><br></span> <span>“I’m hiding from my crazy Aunt and her even crazier boyfriend.” She looked surprised at that but kept her voice even.</span><span><br></span> <span>“And what would your parents say?” She jibed. He smirked at her.</span><span><br></span> <span>“They’re not here, now are they?” He paused. “Though I am worried about my mother, I’m afraid my Aunt’s reappearance in our lives does not bode well. I’d prefer she were away from it all.”</span><span><br></span> <span>“Ah yes, but is she willing to change?”</span><span><br></span> <span>“That’s where I’m afraid I have no answer.” Hermione gave him a quick nod and held up four fingers before pointing to the ground. He smiled</span><span><br></span> <span>“I’m afraid I must be going. Good day to you both!” He strolled back out of the cafe as fast as his legs would take him. Why had he done that? What reason could he possibly have for confiding in Granger of all people? He knew the answer despite all of his head’s protests. because he respected her, he trusted her to keep a clear head. He also had quite a bit of insight into her reading habits, and knew for a fact that she would not rest until she had solved the puzzle.</span><span><br></span> <span>That’s what he was, a puzzle. But could she put him together?</span><span><br></span> <span><br></span> <span>“Why on earth did he come in here if he wasn’t going to get anything!” Clarissa ranted. Hermione was barely listening, her brain lost in the fog that always occupied her thoughts whenever she had a problem to solve. She knew he wasn’t lying. About any of it. She could feel his magic, could feel him.</span><span><br></span> <span>She also knew that ever since third year, the insults he threw at her regularly were less of the truth, and more of a mask to hide his true feelings. She also knew that Theo, who shared a dorm with him, sometimes caught him reading muggle literature. Hermione thought she might have actually stumbled upon his true feelings. She could see them so much clearer than she could at Hogwarts, where there was a constant buzz of magic in the air. She could hardly wait for four-o-clock. She could help him. She knew she could. She was Hermione Granger, she would at least try.</span><span><br></span></p>"""

