[[fics.chapters]]
text = """<p><span>Barry felt as if he couldn’t breathe. He was sinking into the depths of space, every inch of his fuzz being pulled at the edges as he pushed himself forward to see in front of him what he so desperately didn’t want to. Voltron. Voltron floating away in space, destroyed and degenerating, the distance growing with each second. He tried to yell for Keith, tried to yell to the boy who took his heart away, and he could very well feel his heart being dragged away as time slowly passed. Just one final scream and maybe… Just one final… scream.</span></p><p>&nbsp;</p><p><span>————</span></p><p>&nbsp;</p><p><span>Barry woke with a start, his hair disheveled and antennae sticking straight up. It had been a while since his last flashback, if he can call it that. He peered over the edge of his small, altean beehive to see Keith below him, safely sleeping —and snoring. It calmed Barry to see him safe, but also filled him with dread of what was to come. Ever since he was first taken to space with that boy, his life had changed. He no longer worked to pollinate every plant, and was no longer part of his old hive. At times, he missed it, missed his family and friends, missed the honey, the proud feeling he got after making it.</span></p><p><span>Keith turned over in his sleep, quiet mumblings coming from his mouth. Barry, now fully awake, flew down from his bed and nestled into Keith’s soft hair. The boy rustled beneath him, turning with a quiet groan.</span></p><p><span>He couldn’t miss his old life as much as he expected to. Not when he had this life to look forward to.</span></p>"""

