text = """<p>As Axel walked into a store he had managed to avoid the rest of his entire life, he planned the murder of a certain yellow mutt. Because if Zexion didn't have that stupid dog, Axel wouldn't have had to set foot in a store of this type. Axel was good at fixing things. He can always fix things. He would have even been willing to dissect the mutt to find what needed to be fixed, and still manage to fix it. If only Zexion hadn't been around. Apparently it's inhumane to murder a dog, just because it ate something of yours. Axel found this very untrue. The dog was probably going to die because it'd eaten something it wasn't suppose to, so why not do it a favor and kill it before it was in pain and get out Axel's stuff before it dissolved from the stomach acid? Good plan, right? Humane, justified, sympathetic plan. Stupid Zexion.</p><p>Stupid mutt.</p><p>Axel checked his watch. 3:32. He could make it in and out in five minutes, and the stupid clocks wouldn't even have the chance to squeak. The door dinged as he pushed it open, and Axel cringed at the sight in front of him. Clocks. Everywhere, there were clocks. Big clocks, little clocks, coo-coo clocks, clocks with owls on top of them, staring at him, just waiting to devour him. They weren't organized in anyway, and the sat of top of one another haphazardly, saying 'Oh, come on, we're stable. We won't fall on your head and crush your brains out. We love you.' And Axel shuddered.</p><p>For whatever reason, Axel had always hated large clocks or clocks in large numbers. Or clocks with actual eyes on their faces. That was pretty horrible too.</p><p>Of course, there was someone to blame for his strange phobia. It has something to with either his Uncle, or his brother. Or maybe it had been both. And a can of tuna. But Axel doesn't like to go into that, and it didn't matter right this second. He hated clocks, and he didn't want to be here, and Zexion knew he didn't want to be here, and yet, here he was.</p><p>Oh, the stupid homicidal irony.</p><p>"...May I help you?"</p><p>Axel jumped, and swiveled around to face the speaker. He was blonde and... Not old and creepy. That's all that really mattered. Yes, the spikes of hair on his head could probably impale someone, but he wasn't old and balding and creepy. That was always a plus. A bit stoic looking, but what did that matter?</p><p>"Uh, yeah, I'm looking for an alarm clock."</p><p>"...You couldn't have just gone to 'Sora's Stuff' down the street?"</p><p>"...What?"</p><p>"You know, it's like a convenience store, except they sell almost everything you can think of, and..." Axel blinked. The blonde sighed. "Whatever. Doesn't matter. What kind of alarm clock?"</p><p>"A red-" and then he almost blurted out, '-one with the Cheshire cat on the side,' and then he remembered how stupid that sounded, and how much that cat had creeped him out in the first place, and he canceled the thought all together. "-one. A red one. No owls or... or cats on it. Just.... yeah. Red."</p><p>"...Just red."</p><p>"Yeah."</p><p>"...What do you have against cats?"</p><p>Axel scoffed. "I have nothing against cats. I hate dogs. They're horrible, stupid, messy... messy things."</p><p>"Alright then, what do you have against dogs?"</p><p>"A stupid dog ate my alarm clock!"</p><p>"A dog... ate, your... clock."</p><p>"You don't know man, that dog is psycho. He's been eating my stuff for years, but Zexion just won't let me kill the stupid thing."</p><p>The blonde blinked. "Zexion? You don't mean Pluto, do you?"</p><p>"Yeah, that sounds right." Why should he be bothered to remember a stupid mutt's name?</p><p>"Hey, he, that- I know. I just know, alright? Every one always thinks that stupid dog is so perfect and naive, but he's not."</p><p>"Of course he's not! He's stupid and evil! But what, the stupid mutt gets everyone on his side, and then they say things like 'a dog can't eat a wallet'. But they're wrong."</p><p>"He tried to eat my chocobo!"</p><p>"Dude, your chocobo?"</p><p>"Then he chewed off half the seat to my motorcycle! I watched him do it!"</p><p>"And they just won't believe you, will they?! That dog is evil, and one of these days..."</p><p>"One of these days, they won't be looking, and that stupid 'perfect' mutt won't be there anymore-"</p><p>"Everybody, just shut up!" Another blonde, this one shorter, younger, and with softer, but still dangerous looking hair ran into the room from an entrance Axel hadn't even noticed. He looked slightly out of breath, and he looked angry. Or maybe determined. Sometimes they're the same thing.</p><p>The next minute of Axel's life he would later rename 'World War III: Attack of the Blondes'. Not really. But he did for about three seconds after laying on the couch thinking of very little three days later.</p><p>"Look, blondie, I don't know what your problem is-"</p><p>"Dude! Shut up! Just for like," he looked down and seemed to check his watch,"fifty-five seconds, then you can go back to your dog hating fest with Cloud! I don't care! Just shut up!"</p><p>"Roxas, we are not going to go out of our way just so you can continue on with your stupid little hobby."</p><p>"It's not a hobby, Cloud! Don't you dare call this that! It is a very sophisticated and scientific experiment that takes timing, and precision, and hours to reset and check every single one, and then go out of my way to fix the ones that don't sound right or aren't on the right key! You don't know how long that takes, Cloud! And if I didn't do this, you'd have to hire someone to fix everything that breaks instead of just mooching off me!"</p><p>"I don't 'mooch' off you! In case you haven't noticed, Cid pays both of us!"</p><p>"Of course he does! To watch the store and sell stuff! Not to do what I'm doing!"</p><p>"And why should you get paid to do that?! Every morning I come in, I have to sync up every single one of these!"</p><p>The smaller blonde gaped. "It... It was you! You're the one making my life so difficult!"</p><p>"If clocks are you're life, you need a new one!"</p><p>"No I don't! And it's not my life-"</p><p>"Uh, excuse me-"</p><p>"Shut up!" both the blondes yelled simultaneously. Cloud turned away and began to rub his forehead, and the shorter one continued to yell. This time at Axel.</p><p>"If you could just be quiet for the next thirty-seven seconds, I'd go away, and you'd probably never see me again! So just chew on your fist or something!"</p><p>"Hey! I just came here to buy an alarm clock!"</p><p>"I thought I told you to shut up!"</p><p>"So what?! If you'd just give me a stupid alarm clock, I'd pay for it and be out of your life before your stupid thirty-seven seconds were even up!"</p><p>"Just shut up! It's almost time!"</p><p>"Time for what?! What happens in thirty some seconds?!"</p><p>"Thirty-seven! But it's like, ten now, so shut up!"</p><p>"No, I don't think I will. Why should I listen to a-"</p><p>And Axel was cut off by one of the only things he'd not expected. A whale crashing down on everyone from the heavens- check. A clock coming alive, and it's owl trying to peck his eyes out- check. Cloud's hair catching fire, and then him trying to kill them all- dude, he'd checked that like, a minute ago.</p><p>He did not expect a cheeky, loud, blonde brat to suddenly take it upon him self to kiss him somewhat violently, just to 'shut him up'. But for whatever reason, it worked.</p><p>Axel suddenly couldn't breathe. Cloud was behind the counter, gaping like a fish. And Roxas wore a smug expression as he still held Axel's face cupped in his hands and waited, his face not even an inch from Axel's, and he didn't even seem to care. He just stood there, perfectly still. Was he waiting for something? What could he possibly be waiting for? And then, Axel found out.</p><p>The horrid dinging and chiming of what sounded like thousands of fire alarms all going off at the same time erupted from the room at exactly the same time came crashing down on Axel's poor being like rapid gun fire.</p><p>The red head fell to his knees, covering his ears with his hands in a pitiful attempt to block out the painful noise.</p><p>Why? Why was this happening to him? He'd just come in to buy a stupid clock. People said there was nothing to be afraid of in the stores he so defiantly avoided. They said nothing could hurt you in a room full of clocks. They were wrong.</p><p>It was just after three thirty. What sense did this stupid prank make? He'd made sure it was no where near an even hour and most definitely not anywhere even close to resembling noon. Why would someone torment him like this? It just wasn't fair. Nothing fit.</p><p>Axel's mind went completely blank from the pain and the unbearable noise-</p><p>And suddenly, in Axel's perfect little world of pain, everything seemed to make sense. The spikes, the blonde, the kiss, the owl, who was at fault for his fear of clocks, how he could set up the perfect crime and blame the dog for it- Yes! Everything made sense!</p><p>It was the sort of epiphany that came with the brain overloading with pain and hysteria.</p><p>Of course, like most revelations of the sort, it disappeared with out a trace as soon as the throbbing headache went away two days later.</p>"""

