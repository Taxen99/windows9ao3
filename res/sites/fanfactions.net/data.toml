category = "Other"

[[fics.chapters]]
start_notes = "a/n: was feeling angsty, I might continue this later"
text = """<p>Some days, just on the brink of consciousness, Lenalee finds herself thinking about her mother. Most of those days, she half-heatedly laughs away these wishful and pointless thoughts, going about her business. Then again, there's the days she lets them come. She doesn't let herself cry, no, that's something completely different. She doesn't even allow herself to mourn, not anymore. It was too long ago, and it would be an insult to her mother.</p><p>She simply thinks about what use to be. About her mother. The way her mother's beautiful long black hair use to shine in the sun, the way her all knowing eyes were always kind, always. No matter what Lenalee did, no matter what mistakes she made no matter what she accidentally broke- her mother would never yell, never glare at her hatefully. She would always tell Lenalee very clearly what she had done wrong, and then ask her if she had learned from what had happened. Lenalee, tears usually streaking her face, would nod silently. Then her mother would always smile, and say 'That's good, Lena-love.' Lena-love. Lenalee's mother always called her that. She'd had nicknames for both of them, her and Komui.</p><p>Running through her almost blue-black hair with her comb, she vaugly wondered if her own hair would ever make it back to the length of her mother's, if she would ever get lucky enough to have that perfect black color, like her mother. She wondered if she'd ever be more understanding, like her. She wondered if her mother had been like her when she was Lenalee's age. She wondered. She hoped.</p><p>-She wondered if Lavi knew.-</p><p>No, she didn't wonder that. Never. Why would she think about that? It was decided, it was final-</p><p>-She wondered if Lavi would care.-</p><p>He wouldn't, he wouldn't. He really, really wouldn't. If he didn't know, he would never have to know. Never. She could keep this. She could bare this. It wasn't that much.</p><p>-She wondered if she'd ever stop lying to herself.-</p><p>She wasn't! It was true, it was final. Nothing could stop this now, not now that she'd decided. Nothing.</p><p>Besides, it was the only choice she had.</p><p>&lt;-+-&gt;</p><p>Milk- that's all she needed. Just a little bit of milk. They'd run out at headquarters, and she couldn't make Komui's coffee without it. He'd never complain about coffee she'd make, she knew, but she also knew that he preferred his coffee with milk. So, she'd gone into town to get it. That's all she was here for. She wasn't going to talk to anyone unless they talked to her first, or unless they were selling milk. She wasn't going to think about them either. As a matter of fact, she wasn't going to think at all. Yes, that was probably best.</p><p>She'd gotten the milk, and even managed to smile at the seller. That had been a plus. Maybe today wouldn't be so bad after all. Maybe things were looking up.</p><p>"Mommy!" a little girl next to her exclaimed joyfully. Lenalee's breath stopped, and she had to turn around to look. She couldn't help herself.</p><p>She watched as the little girl with black pigtails jumped into her mother's waiting arms, giggling with delight. She watched as they smiled at each other, and exchanged words, she watched them look at each other, with that all-knowing stare, the stare that Lenalee took to mean as they were the only two in their world. There was nothing that could get between them. If you weren't born into this bond, you wouldn't understand.</p><p>Lenalee ran. She ran, faster and harder then she ever had in her life. Maybe she was running for her life. She couldn't tell anymore. She wished she could close her eyes and ears when she ran, so she wouldn't be able to tell what went on around her.</p><p>A baby she'd just passed, crying in her father's arms, probably because he didn't do it as well as mother. A little girl just up ahead, crouching down to play with a bug, her mother watching her from a nearby bench. A child, she wasn't sure how old, in a basket, young eyes staring trustingly up at the one carrying her. Her mother.</p><p>She made it back to headquarters, though she doesn't know how. She only knows, that no matter who called out to her, no matter who said her name, she didn't stop. She didn't stop until she'd reached her room and slammed then locked the door; sliding to the floor right where she was.</p><p>And then the tears she'd managed to hold back for so long began to flow.</p><p>It was then that she realized with a sort of irony that she'd dropped the milk somewhere in town.</p><p>&lt;-+-&gt;</p><p>"Mommy?" Where was she, where was she? "M-momma?" Lenalee twirled around, scanning anything, everything. Where was her mama? She wouldn't cry, Lenalee wouldn't cry, her momma wouldn't like that. But where was she? "Momma!" Maybe if she were louder, maybe her momma was just too far away to hear her. "M-ma-"</p><p>"Shut up, you stupid child!"</p><p>Lenalee winced. Momma... Momma... Why was Momma mad?</p><p>"M-momma? Where are you?" Where had everything gone? Why was everything black?</p><p>Where was momma?</p><p>"Momma... Momma, momma, please... I can't-"</p><p>"I hate you!" Her momma was screaming at her. Her momma never even yelled. She was Lena-love. Why would her mother yell at her Lena-love? Why... why? "Stupid, stupid child! Why are you still here?! I hate you! I never wanted you! Just shut up and die!"</p><p>Lenalee let out a single broken, dry sob. "M-mom-!" What was that? "A-Ahh!" Lenalee fell to her knees. Why did it hurt? Why did her head feel like it was going got split? And her stomach? What was wrong with her stomach? Was... Was that blood? What, what- was Momma doing this? "Momma, please! Please! I'm sorry, momma! I'm sorry!" The tears streamed down her face now- she couldn't make them stop. Momma loved her -no she didn't- why would momma do this?</p><p>"You stupid child! You did this! You did this to me! I never should have bore you!"</p><p>No, no... She didn't want this, she didn't! She was sorry, she was so sorry-</p><p>"Sorry?! That isn't enough! That will never be enough!"</p><p>Lenalee loved her Momma. And... and didn't Momma love her? Didn't she? Why was Momma doing this?</p><p>"I hate you, I hate you!"</p><p>No... no! Her Momma loved her! Her Momma was kind!</p><p>-Her Momma had never said these things.- And the snap back into reality could almost audibly be heard.</p><p>"Momma!" Lenalee screamed, sitting up, scrambling away from the pain, the single cry seeming to echo it's sins to the world.</p><p>Silence. No Momma.</p><p>The real tears came then, dragged over from subconsciousness or memory, and Lenalee felt her face scrunch up in preparation as they fell, not even bothering to try and cover them with her hands or her covers. No... Her mother had never said those things.</p><p>-But those were this things that deserved to be said.-</p>"""

