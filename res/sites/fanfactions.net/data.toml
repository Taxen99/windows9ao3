[[fics.chapters]]
text = """<p>Pacifica was alone.<br>She had never been alone so this was a new experience for her. There had always been some form of servant bustling around, always someone willing to do her bidding. Now there was only silence. Her mansion has been replaced by a comfortable townhouse on the edge of the forest, and her servants by common household appliances that she didn't know how to use at first.  she also missed the illusion of having friends, sure she'd always known that they weren’t really her friends but at least she could pretend before.<br>Everything was different now.<br>She wanted to hate the Pines twins for doing this to her, for ruining her life in this way. But she couldn't bring herself to hate them. not even a little bit. Dipper and Mabel Pines had shown her something about herself that she didn't even know was possible.  they had believed in her when no one else had ever even dared.  How could she hate someone who put so much faith in her?<br>In fact, Pacifica found herself thinking about the twins more often than not. What were they doing? back home in California. What were their lives like? Were they any different there? What did they tell their friends? Their family? Did they have nightmares too?<br>Pacifica learned to adjust. she learned how to use the microwave and the dishwasher, she learned how to keep her head down at school, and how to be nice. She also learned how to fight back against her parents, chopping all her hair off 6 months after weirdmageddon was merely the first step in her ongoing path to disobedience. She was learning how to stand up for herself, she was learning how to do it without the twins. But she still missed them.<br>As the years wore on she thought about them less and less. But then, there was always that small little glimmer of hope every summer when they would return. And her thoughts of them would return tenfold. Each time, they would come back and pretend their other lives didn't exist. That Gravity Falls was all there was in the world. That their struggles weren’t theirs and theirs alone. It wasn’t long before Pacifica realized that the twins were just as messed up as she was. The difference, was that they had each other to lean on. Pacifica had no one.<br>Well, except for them.<br>Pacifica had never really had a friend before. Sure, she had had lackeys, but they weren't the same. It was The Pines twins third summer in gravity falls before she would finally admit they were her friends. Mabel had laughed and patted her on the head saying something about<br>“Silly Pacifica of course they were!”  but Dipper had merely smiled.  Pacifica couldn’t understand why her heart was beating so fast.<br>After another year of public school and listening into on other people's conversations, she finally understood. and she hated herself for it. She didn't understand how she could have let this happen to her. How could she have let herself feel things that could potentially ruin the only friendship she had</p>"""
# dramatic irony is a literary device
