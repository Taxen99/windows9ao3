[[fics.chapters]]
text = """<p>The next bit of consolation comes from learning that Kanda doesn't actually have a girlfriend. He feels guilty for feeling actually a bit happy over this stupid news, delivered by a depressed Lavi.</p><p>"I thought we'd finally have something to talk about. Gah. Yeah, turns out he was briefing Miranda on her mission. Should'a guessed. Knew it was too good to be true. I'd finally have something that really annoys him. Hey, Allen, I think we should try and set him up with someone! Don't you think it'd be great? Maybe he'd finally show some emotion, ya know?"</p><p>Allen had tried to politely decline, thinking, and obtaining from stating, that he'd rather kill himself then have Kanda with someone else. He can think thoughts like this now. He finally figured it wasn't worth it to beat himself up over something so stupid, something he has no control over.</p><p>While Allen strains to not say something that he knows must absolutely not be said, Lavi, he notices, has that look in his eye. The look that says 'I know something you tried to keep from me.' and, 'really now, do you know who you're dealing with? You can't keep things from me.' Then, of course, something about being all powerful.</p><p>"Hey, Allen, have you ever had a girlfriend?"</p><p>Why had he said it like that? "E-eh?" Almost as if... as if the 'girl' part was... optional. The blush that rises slightly was completely out of his control. "O-of course not, Lavi, w-why do you ask?" Was there two questions in Lavi's sentence? ...Which one had he just answered?</p><p>Lavi smirks, and looks away. "Oh, no reason. Just, you know, research. Wonder where Yuu-chan ran off to?" And Lavi, chuckling, ambles off at a leisurely pace.</p><p>...Research? Why kind of research?</p><p>And for some reason, Allen has the strange urge to shoot him. Allen has never actually wanted to shoot anyone other than Kanda.</p><p>Suddenly, Allen thinks that Lavi may know too much. How he got enough information to know too much is beyond Allen's imagination to consider.</p><p>He's certainly not going to be happy about his uncomfortable situation with Kanda, but why not just try to passively ignore it? It's going to happen anyway, so why worry too much about it? It's not like he's going to tell anyone. He keeps hoping that it'll just go away. Allen'll just have to wait until then. He's patient. He can wait.</p><p>Yes, that's the plan. At least he has a plan.</p>"""
