title = "Beloved Clone"
authorid = 101
date = "2001/10/7"
fandom = "Ben 10 Alien Force"
tags = ["Christmas", "dubcon kissing", "the power of pepper spray", "girlboss Julie"]
summary = "Ben is used to getting ambushed by aliens, even on his days off. But when he’s out Christmas shopping with Julie, things go south in ways he would have never expected. (albedo/ben)"
language = "English"
views = 982
category = "Other"

[[fics.chapters]]
text = """<p><span>"Hey Ben, how about getting those fun socks?"&nbsp; Julie pointed at the glass of the men's clothing store, where a pair of red and green toe-socks stood on display. The whole building had Christmas decor spread around it, much like the rest of the town in the holiday season.</span> <span>"No thanks, I'll stick to white." Ben responded, rubbing the back of his neck.</span><span><br></span></p><p><span>"Are you still scared that they'll color your feet?" Gwen smiled at Ben, remembering that fact from when they were young.</span><span><br></span></p><p><span>"What? No! I was like 10 when I thought that!" Ben defended himself, but it was too late. The secret was out.</span><span><br></span></p><p><span>"You still are," Kevin remarked in the middle of his laughing.</span><span><br></span></p><p><span>"Hey!" He shouted, offended and betrayed by his own friend. What was this? A roasting session?</span><span><br></span></p><p><span>"Don't worry Ben, you don't have to deal with us for long. Here’s our stop,” He joked. Kevin and Gwen parted from the two as they went into the tech shop to buy spare car parts, waving a goodbye.</span><span><br></span></p><p><span>"I don't think they color my feet," Ben mumbled after they were a few yards away, and Julie giggled next to him. He walked down the street with her, holding her close.</span></p><p><span>“The café is through here.” She pointed down the one-way street, where a collage of businesses lived. Most restaurants were closed early for the holidays, but Stacy’s Cafe still stayed open. They made their way to the door before Julie stopped, guiding Ben the other way.</span></p><p><span>“Let's go through the side door. I have a friend who works here so I want to say hi!” She directed towards the alleyway. “They close in an hour, though. We should hurr-eek!” Ben instantly became alert as Julie screamed, hand hovering over his wrist. A web flew at her, flinging and sticking her on the nearest wall. The second he turned, he saw an arachnichimp headed straight for him. Right away he realized that this was no native arachnichimp. There was only one other person who held the symbol of the omnitrix on his chest.</span></p><p><span>“Albedo!” Ben shouted, turning the dial on his omnitrix, landing on Swampfire.</span></p><p><span>“Tennyson. It’s been a while. Way too long I've been in this hideous body,” He quickly chirped, lunging for Ben, who hit down on his omnitrix. His DNA changed, molding into whatever genome he wanted.</span></p><p><span>“Grey matter! Aww not again!” Ben looked down at his small body, which definitely wasn't Swampfire.</span></p><p><span>“Are you trying to mock me?” Albedo shouted through clenched fangs, enraged. His eyes squinted, seething with envy.</span></p><p><span>“Uh-oh.” Ben stepped back, a Galvan being one of the worst aliens the omnitrix could have chosen. Not only did it </span><em><span>really</span></em><span> piss off Albedo, but he couldn't do much without any technology around. His instincts screamed for him to slip into the sewers on the side of the street, or to climb through the rain pipe. But Ben wouldn't flee and leave Julie there, pleading him to help. Knowing that Albedo was a Galvan, they were both equal in intelligence. However, spider monkey definitely had the upper hand physically. For the first time in this alien form, he couldn't think of a perfect way to get out. Or, well, he didn't have the time to.</span></p><p><span>Ben dodged out of the way as Albedo shot a web at him. He started climbing up the rain pipe, unhooking the tiny screws holding the bottom together. He waited for Albedo to strike at him, before sending the pipe flying towards him. The time it took Albedo to dodge gave him enough cover to change back to his normal form, ready to try again at Swampfire. The second Ben lifted his hand to strike down a web flung at his fingers, snapping his hand back. Before he knew it, it was too late.</span></p><p><span>Albedo grabbed his wrist, blocking the bulky watch. He shoved Ben up against the brick wall, pinning him. Ben couldn't do anything about it, his energy already drained from the fight. The twin changed back into his human form, making Ben shiver at the sight of himself with the crazed mind of Albedo.</span></p><p><span>“I wouldn't want you overloading your omnitrix this time. I'd prefer to avoid... Azmuth.” He quietly spoke that name with a mix of disgust and fear, as if the Galvan could appear at any second.</span></p><p><span>“Get off of me!” Ben used his last bit of adrenaline to headbutt Albedo, which only managed to hurt them both, a faint throbbing starting up in their foreheads. Albedo leaned in, digging his nails into Ben’s wrists as he squirmed.</span></p><p><span>"You may have beaten me before, but now is different. I know you won't give up your precious little omnitrix, but I think it's my turn to win for a change," he whispered, his breath warm against Ben's ear. Ben tried shoving him away with his free arm, coming into contact with Albedo's shoulder, but Albedo just smirked at his long anticipated victory and licked his lips.</span></p><p><span>“How about I do something you'll definitely hate? Maybe then you will understand in the least how I feel in this body.” He scowled, hating everything about being human. The constant need for chili fries, the clumsiness he can't seem to fix, always being surrounded by idiots; he couldn't stand it. He was a being of intelligence that should be revered, not some lower, disgusting human.</span></p><p><span>He pushed himself up against Ben, connecting with his chapped lips, drawing him into a kiss. Ben froze, eyes wide. He was shocked at the other teen's action. He knew Albedo would do anything to get to him, but this? He gasped as Albedo drew his teeth against his bottom lip, realizing his mistake as the clone slipped his tongue inside. Albedo slid his tongue against the roof of Ben's mouth, the taste of smoothie lingering in Ben's mouth. Ben tried kicking Albedo, who only drew his knee against his crotch to diminish the distance between them, striking a surprised inhale from the teen. They held eye contact, Albedo observing Ben’s every reaction. Albedo broke the kiss, a line of saliva tracing where their lips just were.</span><span><br></span></p><p><span>"Do you really think you'll get away this time, Tennyson? I want to see you suffer, and humans are very disgusted by humiliation." Ben was too shocked to give his usual snarky comeback, instead freezing on the spot, back pressed against the wall.</span><span><br></span></p><p><span>"Ben, don't listen to him! Fight back!" Julie pleaded as she struggled to get out of the web. Albedo glared at her, smiling as he watched her squirm to no avail.</span></p><p><span><br></span> <span>"STOP!" Ben shouted, a delayed response as Julie's words kicked in. He shoved Albedo back, roundhouse kicking him on his side. Albedo clenched his teeth as he lost control of his own fun little game. He struck back, desperately attempting to keep the upper hand. The clone grabbed Ben by the throat, forcing him back.</span></p><p><span><br></span> <span>"You want me to stop so badly? Turn me back." Albedo snarled, wanting no other than to return to his former glory. The grip on his throat was starting to tighten, and Ben couldn't feel air passing through his lungs anymore.&nbsp;</span></p><p><span><br></span> <span>"No," He choked out, clawing at Albedo's arms. Ben started to panic, knowing he couldn't stay like this for long. But before Albedo could respond, he was hit in the face with Julie's leather purse. Ben gasped for air as the pressure was lifted off his throat, lungs burning. Albedo turned to face the girl, only to realize his mistake too late. She held a small, pink canister towards his face and pressed down.</span></p><p>&nbsp;</p><p><span>Albedo screamed, the sound cutting out as he started coughing.</span><span><br></span></p><p><span>"What-" He wheezed, "-is that?"</span><span><br></span></p><p><span>"It's pepper spray, you jerk!" She sprayed him again, resulting in another scream, and looked towards Ben.</span><span><br></span></p><p><span>"You could've sprayed me!" The teen yelped, his own eyes starting to water from the smell. She did save his life, but the spray was uncomfortably close to himself.</span><span><br></span></p><p><span>"Come on Ben, let's go!" Julie grabbed his arm, dragging him down the street and around the corner. They ran all the way down the block, stopping before a bakery. Ben spat at the side of the street as he processed what happened back there.&nbsp;</span></p><p><span>“I don't think I'll ever be able to eat chili fries again. Does he not eat anything else? Eugh!” He wanted to burn his tongue off. His eyes still slightly burned from the pepper spray, and Ben decided to believe it was the reason he was crying.</span></p><p><span>“I have mints if they're any help,” Julie pulled a case of Altoids out of her purse, handing it to Ben. He grabbed a bunch of them and shoved them in his mouth. He sat down on the side of the concrete, chewing the mints.</span></p><p><span>“I can't believe my first real kiss was with… Myself?” He questioned. He always imagined a first kiss with some hot superstar girl or, if he was being realistic, Julie. Ben definitely wasn't expecting a guy, much less his own clone. He didn't care how hot he looked, it was just plain wrong.</span></p><p><span>“Don't stress over it, Ben. It won't be your last, don't let him get to you.” Julie smiled, sitting down next to him. She reached her hand over and laced their fingers together.</span></p><p><span>“Sorry we couldn't go to the café. You'll have to take me another time,” He mumbled, knowing Albedo would still be in the alleyway coughing up a storm.</span></p><p><span>“The bakery is still open if you're up for any desserts,” Julie said, getting up and brushing off her skirt. Ben looked back at the small store, the slice of triple chocolate cake beckoning him.&nbsp;</span></p><p><span>“I can't deny good food. Just one more thing… Please don't tell anyone about this.” Ben averted his eyes. Julie could tell he was hiding as much of his embarrassment as he could, and nodded.</span></p><p><span>“I won't if you don't want me to.” She put a hand on his shoulder before helping him up. They opened the doors to the cute bakery, entering the store.</span></p>"""

